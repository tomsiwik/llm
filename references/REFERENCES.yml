  # ── LoRA Serving & Inference Overhead ─────────────────────────────────────

  - dir: "compress-then-serve"
    source: "https://arxiv.org/abs/2407.00066"
    insight: "Joint SVD compression of LoRA adapters into shared basis + per-adapter scaling. 75% throughput at 1000+ adapters. Key for scaling beyond N=5 simultaneous."
    nodes: [exp_bitnet_llamacpp_serving, exp_bitnet_per_token_routing]
    added: "2026-03-24"

  - dir: "lorafusion-overhead"
    source: "https://arxiv.org/abs/2510.00206"
    insight: "Documents ~40% throughput loss from LoRA despite <1% param increase. Confirms LoRA inference is bandwidth-bound, not compute-bound — FLOP predictions 10x too optimistic."
    nodes: [exp_bitnet_llamacpp_serving]
    added: "2026-03-24"

  - dir: "slora-concurrent-serving"
    source: "https://arxiv.org/abs/2311.03285"
    insight: "S-LoRA serves 1000s of concurrent LoRA adapters on single GPU by separating base computation from per-adapter LoRA. Validates runtime adapter isolation over weight merging for dynamic serving."
    nodes: [exp_bitnet_llamacpp_serving, exp_bitnet_float_merge_fp32]
    added: "2026-03-24"

  - dir: "lori-cross-task-interference"
    source: "https://arxiv.org/abs/2504.07448"
    insight: "LoRI reduces cross-task interference in multi-LoRA via sparse B matrices (90% sparsity). Directly relevant to our lori_sparse_b experiment and validates interference as primary multi-adapter failure mode."
    nodes: [exp_bitnet_lori_sparse_b, exp_bitnet_float_merge_fp32]
    added: "2026-03-24"

  - dir: "tensorized-clustered-lora-merge"
    source: "https://arxiv.org/abs/2508.03999"
    insight: "CP decomposition disentangles task-specific vs shared factors in merged LoRA adapters. Addresses cross-term interference that grows O(N^2) in naive merging."
    nodes: [exp_bitnet_float_merge_fp32, exp_bitnet_per_token_routing]
    added: "2026-03-24"
