  # ── Orthogonal Composition & LoRA MoE (SOLE prior art) ─────────────────────

  - dir: "mdm-oc"
    source: "https://arxiv.org/abs/2507.20997"
    insight: "Gram-Schmidt orthogonalization of weight deltas with learned α coefficients — reversible composition. Closest prior work to SOLE; enforces orthogonality via projection rather than observing it structurally."
    nodes: [exp_ortho_diagnostic, exp_gram_schmidt_composition, exp_lora_procrustes_linear]
    added: "2026-03-12"

  - dir: "osrm"
    source: "https://arxiv.org/abs/2505.22934"
    insight: "Constrained LoRA initialization using minimal-variance eigenvectors — ~14% post-training drift. Enforces orthogonality at init time; SOLE observes it as emergent property."
    nodes: [exp_ortho_diagnostic, exp11_training_time_compat]
    added: "2026-03-12"

  - dir: "smile"
    source: "https://arxiv.org/abs/2408.10174"
    insight: "SVD of weight deltas into orthonormal low-rank experts with sparse routing, zero-shot construction. Closest to SOLE philosophy (structural orthonormality) but requires routing."
    nodes: [exp_ortho_diagnostic, exp5_macro_match, exp_composition_naming]
    added: "2026-03-12"

  - dir: "inflora"
    source: "https://arxiv.org/abs/2404.00228"
    insight: "Orthogonal projection for continual learning — prevents catastrophic forgetting by enforcing orthogonality for sequential task addition."
    nodes: [exp_ortho_diagnostic, exp11_training_time_compat]
    added: "2026-03-12"

  - dir: "molae"
    source: "https://arxiv.org/abs/2503.23100"
    insight: "SVD factorization of MoE into shared projection + expert-specific transforms in latent space — 40-50% param reduction. Defines 'latent experts' concept that SOLE builds on."
    nodes: [exp5_macro_match, exp_composition_naming]
    added: "2026-03-12"

  - dir: "x-lora"
    source: "https://arxiv.org/abs/2402.07148"
    insight: "Dynamic layer-wise token-level LoRA mixing via gating on hidden states. LoRA MoE with learned routing; SOLE eliminates routing via structural orthogonality."
    nodes: [exp5_macro_match, exp_oae_vs_lora_soups, exp_lora_flow_comparison]
    added: "2026-03-12"

  # ── LoRA-Flow ──────────────────────────────────────────────────────────────

  - dir: "lora-flow"
    source: "https://arxiv.org/abs/2402.11455"
    insight: "Dynamic per-layer per-token fusion gate for LoRA composition. w=softmax(W_gate@h)+b. 0.26M params for Llama-2-7b k=2. Outperforms static merging but gate scales O(k*d*L), infeasible at k>=100."
    nodes: [exp_lora_flow_comparison, exp_oae_vs_lora_soups]
    added: "2026-03-15"

  - dir: "elrea"
    source: "https://arxiv.org/abs/2502.00089"
    insight: "Gradient-direction clustering for expert specialization with dynamic contribution adjustment. Cluster-based expert training; SOLE uses independent distillation instead."
    nodes: [exp5_macro_match, exp_composition_naming]
    added: "2026-03-12"

  # ── Semantic Routing ──────────────────────────────────────────────────────

  - dir: "semantic-router"
    source: "https://github.com/aurelio-labs/semantic-router"
    insight: "Utterance-based semantic routing via cosine similarity to exemplar embeddings. O(NK*D) lookup, threshold-based confidence. Adapted for exp_semantic_router micro experiment."
    nodes: [exp_semantic_router]
    added: "2026-03-14"

