  # ── Adversarial Review Discoveries (2026-03-23) ───────────────────────────

  - dir: "osrm-orthogonal-subspaces"
    source: "https://arxiv.org/abs/2505.22934"
    insight: "THE FIX for orthogonality-semantics gap. Weight-space orthogonality is insufficient — need data-aware orthogonality: A_j ⊥ Cov(h_i). Constrains LoRA subspace BEFORE training. +12.78% on Llama-3.2-1B. Plug-and-play with any merging method."
    nodes: [exp_bitnet_semantic_compositionality]
    added: "2026-03-23"

  - dir: "rethinking-lora-orthogonality"
    source: "https://arxiv.org/abs/2510.03262"
    insight: "THREAT (moderated): strict orthogonality does not yield semantic compositionality. BUT paper is about diffusion models, not LLMs. OSRM (2505.22934) provides the LLM-specific fix. Our Grassmannian skeleton may already approximate data-orthogonality at d=2560 via JL-lemma."
    nodes: [exp_bitnet_semantic_compositionality]
    added: "2026-03-23"

  - dir: "flyloraimplicit-moe"
    source: "https://arxiv.org/abs/2510.08396"
    insight: "Frozen sparse random A as implicit router — same mechanism as our Grassmannian skeleton. JL-lemma proves approximate inter-task orthogonality. 180 GitHub stars. Our ternary angle + marketplace vision is the novel delta."
    nodes: [exp_bitnet_semantic_compositionality, exp_bitnet_per_token_routing]
    added: "2026-03-23"

  - dir: "spectral-surgery"
    source: "https://arxiv.org/abs/2603.03995"
    insight: "Training-free LoRA refinement: SVD + gradient-based singular value reweighting. +4.4pp CommonsenseQA on converged adapters. KILLED for our short-trained ternary adapters — already-efficient spectra make surgery zero-sum. SVD re-factorization increases cosine 3.2x (composition-hostile)."
    nodes: [exp_bitnet_spectral_surgery_quality_gate]
    added: "2026-03-23"

  - dir: "essa-evolutionary-alignment"
    source: "https://arxiv.org/abs/2507.04453"
    insight: "Gradient-free evolutionary search on LoRA singular values for alignment. Matches GRPO at 72B scale in INT4/INT8. Alternative to spectral surgery — no assumption about spectral inefficiency. Requires reward signal."
    nodes: [exp_bitnet_spectral_surgery_quality_gate, exp_bitnet_retrain_evolve]
    added: "2026-03-24"

  - dir: "make-lora-great-again"
    source: "https://arxiv.org/abs/2502.16894"
    insight: "Adaptive singular values during LoRA training + MoE optimization alignment. Training-time spectral shaping — addresses inefficiency as it forms rather than post-hoc. Relevant if we ever move to longer training regimes."
    nodes: [exp_bitnet_spectral_surgery_quality_gate]
    added: "2026-03-24"

  - dir: "eigenlorax-subspace"
    source: "https://arxiv.org/abs/2502.04700"
    insight: "SVD of stacked adapters reveals shared principal subspace. 100x fewer params, 2x faster convergence. Candidate for Evolve mechanism replacing clone-compete."
    nodes: [exp_bitnet_eigenlorax_subspace]
    added: "2026-03-23"

  - dir: "zkloraa-verification"
    source: "https://arxiv.org/abs/2501.13965"
    insight: "Zero-knowledge proof for LoRA compatibility. 1-2 sec verification per module at 70B. Directly enables decentralized expert marketplace with IP protection."
    nodes: []
    added: "2026-03-23"

  - dir: "sherry-ternary-sparsity"
    source: "https://arxiv.org/abs/2601.07892"
    insight: "1.25-bit ternary via 3:4 sparsity. Identifies WEIGHT TRAPPING in sparse ternary training — may explain our GaLore quantization degradation. Arenas mechanism maintains representational diversity."
    nodes: [exp_bitnet_galore_scaffold, exp_bitnet_meta_scaffold]
    added: "2026-03-23"

  - dir: "lora-lego-rank-clustering"
    source: "https://arxiv.org/abs/2409.16167"
    insight: "Minimal Semantic Units = individual ranks in LoRA. Rank-wise clustering + dual reweighting for merging. Permutation invariance and concat-sum equivalence properties."
    nodes: [exp_bitnet_semantic_compositionality]
    added: "2026-03-23"

  - dir: "lora-mixer-frozen-deploy"
    source: "https://arxiv.org/abs/2507.00029"
    insight: "Frozen pre-trained LoRA deployment from external repos with Specialization Balance Loss. Directly validates our marketplace vision of grab-and-deploy adapters."
    nodes: [exp_bitnet_per_token_routing, exp_bitnet_llamacpp_serving]
    added: "2026-03-23"

  - dir: "lori-sparse-b"
    source: "https://arxiv.org/abs/2504.07448"
    insight: "Frozen A + 90% sparse B. 95% fewer params than LoRA. Orthogonality via subspace separation + sparsity prevents catastrophic forgetting. 171 GitHub stars."
    nodes: [exp_bitnet_lori_sparse_b]
    added: "2026-03-23"

