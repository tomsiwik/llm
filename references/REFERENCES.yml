  # ── LoRA Composition at Runtime ────────────────────────────────────────────

  - dir: "lora-soups"
    source: "https://arxiv.org/abs/2410.13025"
    insight: "CAT: per-layer learned scalar weights for combining 2 independently trained LoRAs. Beats data mixing by 12%. Binary composition only, requires optimization."
    nodes: [exp_oae_vs_lora_soups, exp_composition_naming]
    added: "2026-03-11"

  # - source: "Ostapenko et al. 2024 (Towards Modular LLMs)" arXiv:2405.11157 — MBC clustering + Arrow zero-shot routing over LoRA library
