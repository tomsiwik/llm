  exp_bitnet_composition_stability:
    title: Equal-weight LoRA composition on BitNet-2B base does not produce catastrophic PPL
    status: supported
    scale: micro
    priority: 1
    depends_on: []
    blocks:
    - exp_bitnet_ternary_adapter_composition
    - exp_bitnet_orthogonality_trained
    - exp_mote_sole_architecture
    experiment_dir: micro/models/bitnet_composition_stability
    kill_criteria:
    - composed PPL > 100x base PPL at N=5 (ternary base does not help)
    - composed PPL > 10x single-adapter PPL on >50% of domains (composition still destructive)
    - training fails or adapters do not converge on BitNet-2B base
    evidence:
    - date: '2026-03-19'
      claim: "All 3 kill criteria PASS (3/3 seeds). Ternary base composition ratio = 0.63
        +/- 0.01 (composed PPL BETTER than ternary base, well below 100x threshold). FP16
        ratio = 1.01 +/- 0.01 (neutral). K2: 0/5 domains exceed 10x single-adapter on
        ternary. K3: all 5 domains converge on ternary base. However, mechanism is
        quantization recovery (not hypothesized interference reduction): ternary base has
        higher PPL (quantization loss), adapters recover it. Adapter cosines comparable
        (0.260 vs 0.275), delta norm CV HIGHER for ternary (0.199 vs 0.107). Status
        SUPPORTED not PROVEN because: (1) post-quantized not natively-trained BitNet,
        (2) FP16 micro does not reproduce macro catastrophe, (3) mechanism differs from
        hypothesis. Kill criteria thresholds designed for interference-based
        catastrophe (100x, 10x) are not informative for the quantization-recovery
        mechanism observed. The experiment confirms non-catastrophic behavior but
        does not validate the hypothesis as stated. FP16 wins 3/5 domains in
        absolute composed PPL; the 1.60x ratio advantage is a denominator effect."
      source: micro/models/bitnet_composition_stability/results.json
    tags:
    - bitnet
    - composition
    - critical-path
    - novel
    created: '2026-03-19'
    notes: "THE make-or-break experiment for BitNet-SOLE. Downloads microsoft/bitnet-b1.58-2B-4T,
      fine-tunes 5 domain LoRA adapters (math, python, medical, bash, sql) using QVAC/standard
      LoRA, then composes at equal weight. Measures PPL on calibration text.
      Compare directly against Qwen2.5 FP16 composition (which produced PPL in trillions).
      If PPL stays bounded (<100x base): ternary base prevents the logit-scale mismatch.
      If PPL still explodes: discrete weight space alone is insufficient.
      Uses bitnet.cpp or HF for inference. Can run on Apple Silicon CPU. $0 cost.
      References: BitNet b1.58 paper (2402.17764), MoTE (2506.14435), QVAC blog."

