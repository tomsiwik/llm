    - no-reset LTE quality >20% worse than reset variant at same compute
    - alpha/r scaling issue persists at macro scale
    evidence:
    - 'micro: no-reset diverged at d=64 due to forward-pass double-counting of LoRA contributions (8x scaling bug). Hypothesized to stabilize at macro where alpha/r is smaller relative to weight norms.'
    - 'macro experiment submitted to GPU queue (run_lte_no_reset_1773513906). GPT-2 125M, d=768, rank=16, alpha=16. 2-way comparison: LTE reset vs no-reset, then 4 domain experts for composition quality.'
    tags:
    - architecture
    - base-freedom
    - novel
    created: '2026-03-14'
    notes: >
      The micro LTE experiment found that no-reset variant diverges at d=64
      due to forward-pass double-counting. At macro scale (d>=768), the LoRA
      contribution (alpha/r * B@A) is proportionally much smaller relative to
      base weights, which may naturally suppress the instability. If no-reset
      works, it eliminates the reset overhead and simplifies the pipeline.

