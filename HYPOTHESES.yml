    blocks: []
    experiment_dir: null
    kill_criteria:
    - hash ring displacement at N=500 exceeds 1% per add (should be ~0.2%)
    - composed model quality degrades >5% vs N=50 model on shared domains
    - vLLM serving fails or exceeds 2x latency vs N=50
    evidence: []
