  exp_procrustes_expert_transfer:
    title: Procrustes alignment transfers experts across base model versions
    status: open
    scale: micro
    priority: 4
    depends_on: []
    blocks: []
    experiment_dir: null
    kill_criteria:
    - transferred expert PPL >20% worse than natively-trained expert
    - Procrustes alignment error >5% (weight spaces too different)
    evidence: []
    tags:
    - composition
    - lifecycle
    - novel
    - cross-domain
    created: '2026-03-10'
    notes: >
      When base model upgrades (v1→v2), do experts need full retraining?

      Procrustes alignment: find rotation R such that Base_v2 ≈ R·Base_v1·R^T,
      then transform all experts: Expert_v2_k = R·Expert_v1_k·R^T.
      Cost: O(d³) once, then O(d·r) per expert (seconds, no GPU training).

      Test: train 5 experts on Qwen2.5-7B. Align to Qwen2.5-3B via Procrustes.
      Do they still work? Compare vs natively-trained 3B experts.

      Key use case for Grassmannian skeleton portability:
      - Same d (e.g. Qwen 7B → Llama 8B, both d=4096): same skeleton,
        Procrustes aligns experts to new model's weight space.
      - Different d (e.g. 7B → 72B): new skeleton needed (~8 min),
        Procrustes maps experts from Gr(r, d_old) to Gr(r, d_new).
      The skeleton is architecture-dependent (defined by d), not
      weight-dependent. Procrustes handles the weight-space alignment.

      Use /notebooklm to research linear mode connectivity, model stitching,
      and Procrustes alignment papers (Ainsworth et al., Frankle et al.).

