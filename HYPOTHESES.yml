      Every step toward new base hurts old base quality. Deploy-then-adapt protocol
      remains practical despite kill: 50-step adaptation is 6x cheaper than retraining
      and closes gap from 3.7% to 2.7%. SVD warm-start from trained deltas is
      strictly better than cold retraining for short budgets.

