  exp_softmax_collision_quantification:
    title: Quantify softmax routing collision rates at scale
    status: proven
    scale: micro
    priority: 12
    depends_on:
    - exp_cuckoo_collision_free_routing
    blocks: []
    experiment_dir: micro/models/softmax_collision_quantification
    kill_criteria:
    - collision rate does not increase with N (contradicts scaling concern)
    - collision-aware routing provides <0.5% quality improvement over naive softmax
    evidence:
    - 'KC1 PASS: collision rate monotonically increases with N at all epsilon levels (3.50x at eps=0.01)'
    - Empirical scaling law C(eps=0.01) = 0.064 * N^0.614, r^2=0.959 (4 points, 2 params)
    - 'N=8: 20.9%, N=16: 37.0%, N=32: 60.6%, N=64: 73.3% (at eps=0.01)'
    - 'Median gap collapses 14x: 0.033 (N=8) -> 0.002 (N=64)'
    - 'KC2 KILLED: T=0.5 gives -0.29% quality (p=0.52, NOT significant). No mitigation >0.5% at p<0.05'
    - 'Dual-T decomposition: T=0.5 collision reduction is 1/3 training effect + 2/3 inference sharpening'
    - T=0.5 reduces collision rate 0.589->0.245 at inference T, but quality effect within noise
    - 'T=2.0 anomaly resolved: v1 seed variance artifact. At T=1.0 measurement, T=2.0 = baseline (0.587 vs 0.589)'
    - Margin loss hurts quality (+0.31%) despite reducing collisions -- aux loss interference (consistent with DeepSeek-V3)
    - 'N-capsules confound acknowledged: N and caps_per_group co-vary, collision scaling may partly reflect reduced per-group
      expressivity'
    - 'Phase 1: 3 seeds, Phase 2: 5 seeds with p-values, 500 steps, 10 min total runtime'
    - Collision quantification is well-documented in literature (Switch Transformers, ReMoE, softmax bottleneck). Contribution
      is empirical measurement, not discovery.
    tags:
    - routing
    - collision
    - scaling
    created: '2026-03-07'
    proven: '2026-03-07'
    notes: 'PROVEN (KC1 passes, KC2 killed). Collision rate scaling with N is confirmed but does not translate to quality
      improvement from simple mitigations at micro scale. The collision problem is real and documented in prior literature.
      Our contribution is the specific empirical scaling law and dual-temperature decomposition showing T=0.5 collision reduction
      is 2/3 inference sharpening, 1/3 learned logit quality. N-capsules confound limits attribution: collision scaling may
      partly reflect reduced per-group expressivity. At macro scale with diverse domains, routing discrimination may matter
      more, making collision mitigation more impactful.'
