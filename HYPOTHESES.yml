  exp_reasoning_expert_distillation:
    title: Distill reasoning capability as composable LoRA expert from DeepSeek-R1 traces
    status: active
    scale: macro
    priority: 1
    depends_on:
    - exp_distillation_pilot_50
    blocks:
    - exp_reasoning_domain_composition
    - exp_reasoning_expert_universality
    experiment_dir: micro/models/reasoning_expert_distillation
    kill_criteria:
    - reasoning LoRA does not improve MATH-500 accuracy >10pp over base (distillation failed)
    - reasoning LoRA composed with domain expert degrades domain quality >5% (interference)
    - reasoning + domain composed model does not outperform either alone on cross-domain reasoning tasks
    evidence:
    - date: '2026-03-13'
      claim: Adversarial design review PROCEED -- experimental design, math foundations, and kill criteria approved for GPU execution
      source: micro/models/reasoning_expert_distillation/REVIEW-adversarial.md
    tags:
    - distillation
    - reasoning
    - composition
    - novel
    - critical-path
    created: '2026-03-12'
    notes: >
      POTENTIALLY REVOLUTIONARY. Instead of one monolithic reasoning model, distill
      reasoning as a composable LoRA adapter that snaps onto any domain expert.

      Insight: Current reasoning models (DeepSeek-R1, Qwen-QwQ) bake reasoning into
      the full model. SOLE can decompose this: reasoning is an ORTHOGONAL capability
      to domain knowledge. A math-reasoning expert + math-domain expert composed via
      addition could outperform either alone.

      Pipeline (following Rasbt ch08 / DeepSeek-R1 approach):
      (1) Generate reasoning traces from DeepSeek-R1 671B via API (~$50 for 12K examples)
           OR use existing dataset: rasbt/math_distill on HuggingFace
      (2) Hard distillation: QLoRA rank-16 on Qwen2.5-7B with <think> token traces
      (3) Test reasoning LoRA alone on MATH-500
      (4) Compose reasoning LoRA + domain expert (e.g., math domain from pilot)
      (5) Benchmark composed model vs reasoning-only vs domain-only vs base

      Key questions:
      - Is reasoning orthogonal to domain knowledge in LoRA weight space?
      - Does composed (reasoning + domain) > max(reasoning-only, domain-only)?
      - Can ONE reasoning adapter improve ALL domain experts universally?
      - Does <think> token generation survive composition?

      If proven: every domain expert in the SOLE library gains reasoning for free
      by composing with a single reasoning adapter. This is a unique SOLE advantage
      that no monolithic model can match — you'd need to retrain each specialist.

      Cost: ~$2 (use existing rasbt/math_distill dataset, train 1 LoRA).
      References: Rasbt "reasoning-from-scratch" ch08, DeepSeek-R1 paper (arXiv:2501.12948).

  exp_reasoning_domain_composition:
    title: Universal reasoning adapter composes with N domain experts without retraining
    status: active
    scale: macro
    priority: 2
    depends_on:
    - exp_reasoning_expert_distillation
    blocks: []
    experiment_dir: macro/reasoning_domain_composition
    kill_criteria:
    - reasoning adapter improves <50% of domain experts (not universal)
    - average domain quality degradation >3% when reasoning adapter is added
    - reasoning traces become incoherent when composed with domain experts
    evidence:
    - 'Submitted run_reasoning_composition_1773518403: tests all pilot50 experts with/without reasoning adapter'
    tags:
    - reasoning
    - composition
    - universality
    - novel
    created: '2026-03-12'
    notes: >
      If reasoning is truly orthogonal, ONE reasoning adapter should improve ALL
      domain experts. Test with 10+ domain experts from pilot:
      (1) Baseline: each domain expert alone on domain-specific + reasoning tasks
      (2) Composed: each domain expert + reasoning adapter on same tasks
      (3) Measure: accuracy delta, PPL delta, <think> trace quality

      This would be the killer demo for SOLE: "add reasoning to any expert in 0 seconds."
      No retraining, no data generation, just compose and serve.

  exp_capability_expert_taxonomy:
    title: Taxonomy of composable capabilities beyond domain knowledge
    status: open
    scale: micro
    priority: 3
    depends_on:
    - exp_reasoning_expert_distillation
    blocks: []
    experiment_dir: null
    kill_criteria:
    - fewer than 3 capability types show orthogonal composition (limited to reasoning only)
    - capability experts interfere with each other (cos > 0.01 between capability LoRAs)
    evidence: []
    tags:
    - reasoning
    - capabilities
    - taxonomy
    - novel
    created: '2026-03-12'
    notes: >
      If reasoning works as a composable capability, what else can be decomposed?
      Survey and test candidates:
      - Reasoning (chain-of-thought, <think> traces)
      - Instruction following (RLHF/DPO alignment as LoRA)
      - Safety/guardrails (refuse harmful, as composable layer)
      - Multilingual (language as capability, not domain)
      - Code execution planning (agentic behavior)
      - Conciseness/verbosity (style as capability)
      - Citation/attribution (academic writing behavior)

      If multiple capability types compose orthogonally with domain experts,
      SOLE becomes a modular capability stack:
        base + domain + reasoning + safety + language = full model
      Each capability independently upgradeable. This is the "Unix philosophy for LLMs."

