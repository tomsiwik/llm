    experiment_dir: micro/models/bitnet_semantic_compositionality
    kill_criteria:
    - composed (medical+reasoning) adapter worse than either alone on >50% of cross-domain queries
    - semantic coherence of composed outputs rated lower than base on manual inspection of 20 samples
    - OSRM diagnostic shows ||A_j * h_i|| > 0.1 * ||A_i * h_i|| for >50% of pairs (data-space interference)
    evidence:
    - date: '2026-03-23'
      claim: 'K3 KILL: 100% (20/20) adapter pairs fail OSRM data-orthogonality (mean A-only ratio 0.86,
        mean BA-full ratio 0.88, all >>0.1 threshold). Weight-space orthogonality (|cos|~0.001) does NOT
        translate to data-space orthogonality. BUT composition still WORKS semantically: K1 PASS (composed
        better on 4/5 pairs, mean composed PPL 8.35 vs best-individual 8.58), K2 PASS (90% coherent).
        Key insight: composition works through constructive cross-domain transfer + 1/N regularization,
        NOT through data-space orthogonality. B matrices do NOT filter cross-domain activations (BA ratio
        ~= A-only ratio). Hidden states have low intrinsic dimensionality (~22, explaining ratio ~0.86).
        OSRM-style initialization unnecessary for current use case but may help at N>>25.'
      source: micro/models/bitnet_semantic_compositionality/results.json
    tags:
    - bitnet
    - composition
    - semantics
    - critical-path
    - novel
    - osrm
    created: '2026-03-23'
    notes: "CRITICAL GAP from adversarial review. Two papers frame the problem:
      (1) 2510.03262 (Rethinking Inter-LoRA Orthogonality, Oct 2025) — shows weight-space
      orthogonality alone is insufficient for semantic compositionality. BUT: this paper
      is about DIFFUSION MODELS (image generation), not LLMs. Visual concept entanglement
      differs fundamentally from language domain knowledge composition.
      (2) 2505.22934 (OSRM, May 2025) — identifies the FIX for LLMs. The real interference
      is not cos(DW_1, DW_2) but ||B_2 * A_2 * h_1|| — how adapter 2 transforms adapter 1's
      DATA. OSRM constrains A_j to be orthogonal to Cov(h_i) (other tasks' hidden state
      covariance), not just other tasks' weights. Results: +12.78% per-task improvement on
      Llama-3.2-1B across 8 benchmarks.
      Our Grassmannian skeleton gives A_i perp A_j (weight-space). OSRM needs A_j perp Cov(h_i)
      (data-space). At d=2560 with random A, JL-lemma suggests these approximately coincide.
      THIS EXPERIMENT tests both:
      Part A — Semantic eval: compose medical+reasoning adapters, cross-domain questions,
      compare vs base and individual adapters. KR-Test style + manual inspection.
      Part B — OSRM diagnostic: for all (i,j) adapter pairs, measure ||A_j * h_i|| / ||A_i * h_i||.
      If ratio is small (<0.1), our Grassmannian skeleton is already approximately data-orthogonal
      and OSRM is unnecessary. If ratio is large, we need OSRM-style A initialization.
      Pure measurement + generation eval. Reuses existing adapters. $0, ~1 hr."

