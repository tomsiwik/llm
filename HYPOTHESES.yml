      better uniformity. Low priority — only matters if N stays small.

  # ── Phase 3: Evolve ──────────────────────────────────────────────

  exp_clone_compete_evolution:
    title: Clone-and-compete expert evolution mechanism
    status: active
    scale: macro
    priority: 2
    depends_on:
    - exp_distillation_pilot_50
    - exp_hash_ring_remove_expert
    blocks:
    - exp_evolution_convergence
    experiment_dir: null
    kill_criteria:
    - corrected clone does not win tournament >70% of the time (corrections don't help)
    - tournament requires >50K queries to resolve (too slow for practical evolution)
    - original expert domains regress >2% during tournament (competition causes interference)
    evidence: []
    tags:
    - evolution
    - clone-compete
    - feedback-loop
    - novel
    - critical-path
    created: '2026-03-07'
    notes: >
      THE KEY INNOVATION. When an expert produces wrong output:
      (1) Clone expert → fine-tune clone with correction (50-100 steps, ~30 sec)
      (2) Register both on hash ring (clone gets ~1/(N+1) traffic)
      (3) Shadow scoring: when original selected, also score clone on same input
      (4) Compare per-token perplexity over ~1K-10K queries
      (5) Prune the loser

      Test protocol: take 5 experts from pilot, inject deliberate errors,
      provide corrections, measure tournament convergence rate and speed.

      Controls: max 3 concurrent clones per domain, 10K query tournament timeout.

      This requires exp_hash_ring_remove_expert for pruning the loser.

      Research first: Use /notebooklm to survey evolutionary model merging
      (Sakana AI "Evolutionary Optimization of Model Merging Recipes"),
      continual learning via adapter competition, and online learning for LLMs.
      Key question: has anyone done clone-and-compete for LoRA experts specifically?

  exp_evolution_convergence:
    title: Continuous evolution improves model quality monotonically
    status: open
    scale: macro
    priority: 5
    depends_on:
    - exp_clone_compete_evolution
    blocks: []
    experiment_dir: null
    kill_criteria:
    - model quality does not improve after 10 evolution cycles (corrections don't accumulate)
    - quality oscillates (winner of cycle N loses to loser of cycle N-2)
    - expert lineage diverges (v5 is worse than v1 on original domain)
    evidence: []
    tags:
    - evolution
    - convergence
    - macro
    created: '2026-03-07'
    notes: >
      The ultimate test: does the living model actually get better over time?

      Protocol: run 10 evolution cycles on 5 experts. Each cycle:
      (1) Evaluate all experts on domain-specific held-out set
      (2) Generate corrections using 70B teacher for worst-performing queries
      (3) Clone-and-compete
      (4) Measure quality after tournament resolves

      Plot quality curve over cycles. Must be monotonically improving.
      If quality oscillates, the correction signal is noisy or the tournament
      is not selecting the right winner. If quality plateaus, corrections
      have diminishing returns (expert capacity saturated).

      Research first: Use /notebooklm to survey continual learning convergence
      guarantees, online learning regret bounds, and RLHF iteration stability.
      Check if DPO-style updates have monotonic convergence properties.

  exp_automated_correction_pipeline:
    title: Automated correction generation from teacher model
    status: active
    scale: macro
    priority: 4
    depends_on:
    - exp_distillation_pilot_50
    blocks:
    - exp_clone_compete_evolution
    experiment_dir: macro/automated_correction_pipeline
    kill_criteria:
    - teacher-generated corrections are wrong >20% of the time (teacher unreliable)
    - automated corrections improve expert quality <50% as much as human corrections
    evidence:
    - date: '2026-03-14'
      claim: 'Experiment script written and submitted to GPU queue. 5 domains, 70B teacher via Groq API, dual kill criteria (teacher reliability + correction effectiveness).'
      source: macro/automated_correction_pipeline/run_correction_pipeline.py
    tags:
    - distillation
    - correction
    - automation
    - critical-path
    created: '2026-03-07'
    notes: >
      The evolution loop needs automated correction sources. Pipeline:
      (1) Serve queries through composed model, log (input, output, expert_ids)
      (2) Sample outputs, send to 70B teacher: "Is this correct? If not, provide correction"
      (3) Filter: only keep corrections where teacher confidence is high
      (4) Feed corrections into clone-and-compete pipeline

      Cost: ~$0.001 per judged query (70B, ~1K tokens).
      At 1000 queries/day: $1/day for continuous improvement.

      For code domains: use execution-based validation (run the code, check output).
      Free and perfect signal. No teacher needed.

      Research first: Use /notebooklm to survey LLM-as-judge reliability
      (MT-Bench, AlpacaEval), automated correction pipelines (Constitutional AI,
      RLAIF), and self-play approaches (Self-Instruct, WizardLM Evol-Instruct).

  # ── Composable Architecture Research ─────────────────────────────

  exp_minimum_viable_base:
    title: Minimum base model size for effective expert composition
    status: active
    scale: micro
    priority: 3
    depends_on: []
    blocks: []
    experiment_dir: micro/models/minimum_viable_base
    kill_criteria:
    - base <1.5B cannot support expert composition (PPL improvement <5%)
    - expert quality scales linearly with base size (no sweet spot)
    evidence:
    - date: '2026-03-10'
      claim: 'rank-8 FFN-only on 7B gives PPL 1.59 for bash (near rank-128 at 1.50)'
      source: 'rank sweep experiment on RunPod'
    - date: '2026-03-07'
      claim: '0.5B base too weak for expert composition (killed prior experiment)'
      source: 'micro experiment archive'
    tags:
    - composition
    - scaling
    - base-model
    created: '2026-03-10'
    notes: >
      The base provides attention wiring + embeddings. Experts provide domain FFN.
      How small can the base be before composition breaks?

      Test rank-8 FFN-only experts on: Qwen2.5-0.5B, 1.5B, 3B, 7B.
      Same training data, same domains. Measure PPL improvement per base size.

      Sweet spot is likely 1.5-3B: big enough for attention quality,
      small enough for fast inference. Prior work killed 0.5B.

      Research first: Use /notebooklm to survey base model size vs adapter
      effectiveness (LoRA papers across model sizes, Phi-style small models,
      TinyLlama). Check references/tiny-aya-parallel/ for small-model
      multi-lingual LoRA approaches.

  exp_composable_merge_pipeline:
    title: End-to-end merge pipeline with quality gates
    status: active
    scale: macro
    priority: 5
    depends_on:
    - exp_gram_schmidt_composition
    - exp_collision_scaling
    blocks: []
    experiment_dir: macro/composable_merge_pipeline
    kill_criteria:
    - merged model (N=20) loses >5% quality vs individually-served experts
    - merge + benchmark cycle takes >1 hour (too slow for self-learning loop)
    evidence:
    - 'macro experiment submitted to GPU queue (run_composable_merge_1773518793). Unit-weight linear merge of up to 20 pilot50 adapters. Per-domain PPL comparison merged vs individual. Date: 2026-03-14.'
    tags:
    - composition
    - pipeline
    - critical-path
    created: '2026-03-10'
    notes: >
      Build composer/merge.py: the production merge pipeline.
      Steps: (1) Gram-Schmidt orthogonalize new expert against existing pool
      (2) Merge via weight addition (3) Benchmark merged model
      (4) Accept/reject based on quality gate

      This is the core of the self-learning loop:
      train expert → orthogonalize → merge → benchmark → deploy.

      Depends on Gram-Schmidt and collision scaling experiments to validate
      the composition approach works at scale.

      Research first: Use /notebooklm to survey LoRA merging pipelines
      (mergekit, LM-Cocktail, Model Breadcrumbs). Check references/ties-merging/
      and references/dare-merging/ for quality gate implementations.

  exp_execution_based_self_learning:
    title: Code experts self-improve via execution feedback loop
    status: open
    scale: micro
    priority: 3
    depends_on:
    - exp_ppl_vs_task_performance
    blocks: []
    experiment_dir: null
    kill_criteria:
    - self-learning loop does not improve pass@1 after 5 cycles
    - generated training data quality degrades over cycles (model collapse)
    evidence: []
    tags:
    - evolution
    - self-learning
    - code
    - novel
    - critical-path
    created: '2026-03-11'
    notes: >
      For code domains, execution IS the oracle. No teacher needed.

      Loop: (1) Expert generates K solutions per MBPP problem
      (2) Execute each against test cases
      (3) Passing solutions → new training data
      (4) Retrain expert on combined original + passing data
      (5) Measure pass@1 improvement
      (6) Repeat

      Also test DPO variant: use (pass, fail) pairs as (chosen, rejected).
      DPO should be stronger because it teaches what NOT to do.

      Watch for model collapse: if the expert only trains on its own outputs,
      diversity may decrease. Track output diversity across cycles.

      Research first: Use /notebooklm to survey self-play and self-improvement
      for code LLMs (AlphaCode, CodeRL, RLTF, Self-Debugging). Check
      StarCoder self-improvement and Reflexion for execution-feedback loops.

  # ── Reviewer Attack: "Cross-domain queries break everything" ───

  exp_composition_vs_moe:
    title: Composed LoRA experts vs trained MoE architecture
    status: open
    scale: micro
    priority: 5
    depends_on:
    - exp_composable_merge_pipeline
    blocks: []
    experiment_dir: null
    kill_criteria:
    - MoE beats composition by >15% on task quality at same parameter budget
    - MoE routing overhead is <2x composition inference cost
    evidence: []
    tags:
    - composition
    - baselines
    - moe
    created: '2026-03-11'
    notes: >
      Reviewer attack: "Mixtral already solves this with jointly-trained
      experts and a learned router. What's your advantage?"

      Compare our composition approach vs:
      (a) Standard MoE (jointly-trained experts + gating)
      (b) Our approach (independent experts + addition/routing)

      Our advantages: independent training (parallelizable, cheaper),
      modular add/remove, no full retraining when adding domains.
      MoE advantages: learned routing, optimized expert interaction.

      Use references/mixtral-8x7b/ and references/switch-transformers/.

      Research first: Use /notebooklm to survey MoE vs modular adapter
      comparisons in literature. Check references/soft-moe/ for dense MoE
      alternatives. Key question: can LoRA composition match MoE quality
      at lower training cost?

  # ── Reviewer Attack: "Catastrophic failure at scale" ───────────

  exp_quality_degradation_detection:
    title: Detect when adding expert N degrades expert M
    status: open
    scale: micro
    priority: 4
    depends_on:
    - exp_gram_schmidt_composition
    blocks: []
    experiment_dir: null
    kill_criteria:
    - detection method has >20% false negative rate (misses real degradation)
    - detection adds >10 min to merge pipeline
    evidence: []
    tags:
    - composition
    - safety
    - monitoring
    created: '2026-03-11'
    notes: >
      Reviewer attack: "At N=500, there are 124,750 pairwise interactions.
      How do you verify expert #347 hasn't subtly degraded expert #12?"

      Options: (a) Full pairwise eval (O(N²), too expensive at scale)
      (b) Sample-based: eval random subset of existing experts after each add
      (c) Cosine-based gate: only eval experts with cosine >threshold to new one
      (d) Canary queries: fixed set of regression tests per domain

      Implement and compare detection rate vs cost. Option (c) is most
      promising — only check potentially-affected experts.

      Research first: Use /notebooklm to survey regression detection in
      continual learning (backward transfer metrics, forgetting measures),
      and ML model monitoring (data drift detection, performance monitoring).

  exp_expert_removal_graceful:
    title: Removing an expert from merged model doesn't break others
    status: open
    scale: micro
    priority: 4
    depends_on:
    - exp_gram_schmidt_composition
    blocks: []
    experiment_dir: null
    kill_criteria:
    - removing expert causes >3% PPL regression on remaining experts
    - Gram-Schmidt cascade recomputation takes >10 min at N=50
