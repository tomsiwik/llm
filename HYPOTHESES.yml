nodes:
  # ── Phase 1: Distill ──────────────────────────────────────────────

  exp_distillation_pilot_50:
    title: 50-expert distillation pipeline end-to-end
    status: open
    scale: macro
    priority: 1
    depends_on: []
    blocks:
    - exp_clone_compete_evolution
    - exp_scale_500_experts
    experiment_dir: null
    kill_criteria:
    - composed 50-expert model does not beat base on >80% of expert domains (MMLU subsets or HumanEval)
    - distilled experts show <2% improvement over base on their own domain (distillation failed)
    - pipeline cost exceeds $0.50/expert (economics don't scale)
    evidence: []
    tags:
    - distillation
    - pipeline
    - macro
    - critical-path
    created: '2026-03-07'
    notes: >
      THE FIRST MILESTONE. Build automated pipeline:
      (1) Domain taxonomy generation via cheap model
      (2) Training data generation via Groq batch API (Llama 3.3 70B, $0.19/expert)
      (3) QLoRA training on RunPod A5000 with Unsloth (~15 min/expert)
      (4) compose add + hash ring registration
      (5) Benchmark vs base model on domain-relevant eval sets.

      Base model: Qwen2.5-7B (4-bit). LoRA: rank-16, all projections.
      Budget: ~$13 for 50 experts. Use remaining budget for eval.

      Domain selection for pilot: 10 programming languages, 10 science subfields,
      10 professional domains, 10 writing styles, 10 reasoning types.

  exp_distillation_quality_vs_teacher:
    title: Expert quality as function of teacher model size
    status: open
    scale: macro
    priority: 3
    depends_on:
    - exp_distillation_pilot_50
    blocks: []
    experiment_dir: null
    kill_criteria:
    - 70B teacher produces <5% better experts than 8B teacher (teacher size doesn't matter)
    - mixed teacher strategy (8B for simple, 70B for complex) does not beat uniform 70B
    evidence: []
    tags:
    - distillation
    - teacher-size
    - economics
    created: '2026-03-07'
    notes: >
      Critical for cost optimization. Compare expert quality from:
      (a) Llama 3.1 8B teacher ($0.02/expert) — barely larger than 7B student
      (b) Llama 3.3 70B teacher ($0.19/expert) — proper 10x distillation
      (c) Mixed: 8B for code/factual, 70B for reasoning/nuanced domains

      If 8B works for simple domains, cost drops 10x for those categories.
      Measure per-domain quality (perplexity + downstream eval) not just average.

  # ── Phase 2: Compose at Scale ─────────────────────────────────────

  exp_scale_500_experts:
    title: Scale composition to 500 experts on 7B base
    status: open
    scale: macro
    priority: 4
    depends_on:
    - exp_distillation_pilot_50
    blocks: []
    experiment_dir: null
    kill_criteria:
    - hash ring displacement at N=500 exceeds 1% per add (should be ~0.2%)
    - composed model quality degrades >5% vs N=50 model on shared domains
    - vLLM serving fails or exceeds 2x latency vs N=50
    evidence: []
    tags:
    - scaling
    - composition
    - hash-ring
    - macro
    - critical-path
    created: '2026-03-07'
    notes: >
      Scale test after pilot proves pipeline works. 500 experts across
      diverse domains. Measures: hash ring stability, vLLM serving performance,
      aggregate quality vs base model, per-domain specialization retention.

      Storage: 500 * 6MB = 3GB. Well within NVMe.
      Orthogonality: 500 / 609K = 0.08% of capacity. Should be trivially safe.

  exp_hash_ring_remove_expert:
    title: Expert removal via consistent hash ring (graceful degradation)
    status: open
    scale: micro
    priority: 5
    depends_on:
    - exp_consistent_hash_routing
    blocks:
    - exp_clone_compete_evolution
    experiment_dir: null
    kill_criteria:
    - '>5% degradation when removing one expert from N=8 without recalibration'
    - removed expert tokens not redistributed to nearest neighbor (>20% go to non-neighbor)
    evidence: []
    tags:
    - routing
    - consistent-hashing
    - fault-tolerance
    - critical-path
    created: '2026-03-06'
    notes: >
      REQUIRED for evolution phase. Clone-and-compete needs expert removal
      (prune the loser). Add-expert validated at +0.20% / 9.1% displacement.
      Remove-expert is the dual operation: removing one expert should redistribute
      only its ~1/N tokens to the next clockwise neighbor.

  # ── Phase 3: Evolve ──────────────────────────────────────────────

  exp_clone_compete_evolution:
    title: Clone-and-compete expert evolution mechanism
    status: open
    scale: macro
    priority: 2
    depends_on:
    - exp_distillation_pilot_50
    - exp_hash_ring_remove_expert
    blocks:
    - exp_evolution_convergence
    experiment_dir: null
    kill_criteria:
    - corrected clone does not win tournament >70% of the time (corrections don't help)
    - tournament requires >50K queries to resolve (too slow for practical evolution)
    - original expert domains regress >2% during tournament (competition causes interference)
    evidence: []
    tags:
    - evolution
    - clone-compete
    - feedback-loop
    - novel
    - critical-path
    created: '2026-03-07'
    notes: >
      THE KEY INNOVATION. When an expert produces wrong output:
      (1) Clone expert → fine-tune clone with correction (50-100 steps, ~30 sec)
      (2) Register both on hash ring (clone gets ~1/(N+1) traffic)
      (3) Shadow scoring: when original selected, also score clone on same input
      (4) Compare per-token perplexity over ~1K-10K queries
      (5) Prune the loser

      Test protocol: take 5 experts from pilot, inject deliberate errors,
      provide corrections, measure tournament convergence rate and speed.

      Controls: max 3 concurrent clones per domain, 10K query tournament timeout.

      This requires exp_hash_ring_remove_expert for pruning the loser.

  exp_shadow_scoring:
    title: Shadow scoring for fair expert A/B comparison
    status: open
    scale: micro
    priority: 3
    depends_on: []
    blocks:
    - exp_clone_compete_evolution
    experiment_dir: null
    kill_criteria:
    - shadow scoring overhead >5% of inference latency
    - shadow perplexity does not correlate with actual serving quality (r² < 0.5)
    evidence: []
    tags:
    - evolution
    - evaluation
    - shadow-scoring
    - critical-path
    created: '2026-03-07'
    notes: >
      When the router selects expert A, also compute expert B's output on
      the same input (without serving it). Compare per-token perplexity.

      Implementation: after router selects top-k experts, also run the
      competing clone's LoRA forward pass. Compare loss against actual next
      token. Log (query_id, expert_a_loss, expert_b_loss) for tournament.

      Cost: one extra LoRA forward per query where a tournament is active.
      At rank-16, this is ~0.5% FLOP overhead. Should be negligible.

      Validate that shadow perplexity predicts real quality by comparing
      shadow scores with held-out eval set scores.

  exp_evolution_convergence:
    title: Continuous evolution improves model quality monotonically
    status: open
    scale: macro
    priority: 5
    depends_on:
    - exp_clone_compete_evolution
    blocks: []
    experiment_dir: null
    kill_criteria:
    - model quality does not improve after 10 evolution cycles (corrections don't accumulate)
    - quality oscillates (winner of cycle N loses to loser of cycle N-2)
    - expert lineage diverges (v5 is worse than v1 on original domain)
    evidence: []
    tags:
    - evolution
    - convergence
    - macro
    created: '2026-03-07'
    notes: >
      The ultimate test: does the living model actually get better over time?

      Protocol: run 10 evolution cycles on 5 experts. Each cycle:
      (1) Evaluate all experts on domain-specific held-out set
      (2) Generate corrections using 70B teacher for worst-performing queries
      (3) Clone-and-compete
      (4) Measure quality after tournament resolves

      Plot quality curve over cycles. Must be monotonically improving.
      If quality oscillates, the correction signal is noisy or the tournament
      is not selecting the right winner. If quality plateaus, corrections
      have diminishing returns (expert capacity saturated).

  exp_automated_correction_pipeline:
    title: Automated correction generation from teacher model
    status: open
    scale: macro
    priority: 4
    depends_on:
    - exp_distillation_pilot_50
    blocks:
    - exp_clone_compete_evolution
    experiment_dir: null
    kill_criteria:
    - teacher-generated corrections are wrong >20% of the time (teacher unreliable)
    - automated corrections improve expert quality <50% as much as human corrections
    evidence: []
    tags:
    - distillation
    - correction
    - automation
    - critical-path
    created: '2026-03-07'
    notes: >
      The evolution loop needs automated correction sources. Pipeline:
      (1) Serve queries through composed model, log (input, output, expert_ids)
      (2) Sample outputs, send to 70B teacher: "Is this correct? If not, provide correction"
      (3) Filter: only keep corrections where teacher confidence is high
      (4) Feed corrections into clone-and-compete pipeline

      Cost: ~$0.001 per judged query (70B, ~1K tokens).
      At 1000 queries/day: $1/day for continuous improvement.

      For code domains: use execution-based validation (run the code, check output).
      Free and perfect signal. No teacher needed.

  # ── Supporting Research ───────────────────────────────────────────

  exp_relu_router_vs_softmax:
    title: ReLU routing eliminates softmax collision by construction
    status: open
    scale: micro
    priority: 8
    depends_on:
    - exp_softmax_collision_quantification
    blocks: []
    experiment_dir: null
    kill_criteria:
    - ReLU routing quality >1% worse than softmax at N=32
    - ReLU routing still produces >30% collision rate at eps=0.01
    evidence: []
    tags:
    - routing
    - relu
    - collision
    created: '2026-03-07'
    notes: >
      At N=500+, softmax collision becomes a real concern. ReMoE (ICLR 2025)
      shows ReLU routing avoids probability compression. Compare at N=32.
      Not on critical path but important for scaling beyond 500 experts.

  exp_domain_taxonomy_generation:
    title: Automated domain taxonomy for expert coverage planning
    status: open
    scale: micro
    priority: 6
    depends_on: []
    blocks:
    - exp_distillation_pilot_50
    experiment_dir: null
    kill_criteria:
    - generated taxonomy has >30% overlap between domains (not distinct enough)
    - '>20% of domains produce experts indistinguishable from base model (domain too vague)'
    evidence: []
    tags:
    - distillation
    - taxonomy
    - automation
    created: '2026-03-07'
    notes: >
      What ARE the 50 (then 500, then 5000) domains? Need automated taxonomy.

      Approach: use cheap model (8B) to generate hierarchical domain tree.
      Root categories: programming, science, professional, languages, reasoning.
      Each leaf = one expert domain with specific training data requirements.

      Validate: train experts on leaf domains, measure distinctness via
      orthogonality check and per-domain eval improvement over base.
      Merge domains that produce indistinguishable experts.
