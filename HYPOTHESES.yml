    evidence:
    - date: '2026-03-14'
      claim: 'K1 PASS: worst routing latency 4.25us (0.004ms) at N=100, 12500x below 50ms threshold'
      source: 'micro/models/inference_routing_strategies/'
    - date: '2026-03-14'
      claim: 'K2 PASS: worst routing/compute ratio 0.004 (0.4% of 1ms inference), routing is negligible'
      source: 'micro/models/inference_routing_strategies/'
    - date: '2026-03-14'
      claim: 'K3 KILL: best quality capture 0.415 (tiny classifier, N=5, 1:1 ratio), best quality lift 0.091 (9.1% of oracle gap). No config achieves >90%.'
      source: 'micro/models/inference_routing_strategies/'
    - date: '2026-03-14'
      claim: 'Pareto frontier has 2 points: premerge (0us, 23% capture) and embedding_sim (3us, 27% capture). Gap is negligible.'
      source: 'micro/models/inference_routing_strategies/'
    - date: '2026-03-14'
      claim: 'Hierarchical routing (cluster cosine + hash ring) is Pareto-optimal for selective routing: ~4us, near-constant with N, 97% cluster accuracy from prior experiments.'
      source: 'micro/models/inference_routing_strategies/'
    tags:
    - inference
    - routing
    - critical-path
    created: '2026-03-11'
    notes: >
      Given the latency profile from exp_inference_latency_vs_N, what's the
      best way to select experts at query time?

      Compare: (a) pre-merge all (zero routing cost, all experts active)
      (b) hash ring (O(1) lookup, content-unaware)
      (c) embedding similarity (O(N) or O(log N) with index)
      (d) tiny classifier head (O(1) after training)
      (e) hierarchical: coarse category → fine expert

      For each: measure routing latency, expert selection accuracy,
      end-to-end quality. Find the Pareto frontier.

      Research first: Use /notebooklm to survey expert routing in
      production MoE systems (GShard, Switch Transformer serving,
      Mixtral inference optimization). How do they handle routing latency?

