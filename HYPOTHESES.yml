    title: Homomorphic expert composition (privacy-preserving)
    status: partially_proven
    scale: micro
    priority: 12
    depends_on: []
    blocks: []
    experiment_dir: micro/models/homomorphic_composition
    kill_criteria:
    - encryption noise degrades composition >5%
