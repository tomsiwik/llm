    evidence:
    - 'KC1 PASS: quality gap 0.000003% across 3 seeds (24-bit quant). Paillier is noiseless.'
    - 'KC2 KILL: ~7000x slowdown (2048-bit, batch-packed, gmpy2). Dominated by encrypt/decrypt cost.'
    - 'Quality is exactly preserved. Performance makes Paillier impractical for element-level weight encryption.'
    - 'Alternatives: CKKS (~100x), secure aggregation (~10x), differential privacy (~1x).'
    tags:
    - crypto
    - homomorphic
    - privacy
    - composition
    - novel
    - cross-domain
    created: '2026-03-06'
    notes: 'RESULT: Quality perfectly preserved (max 0.000003% gap, 3 seeds, 24-bit).
      Performance killed (~7000x slowdown). Paillier HE is mathematically sound for
      additive composition but computationally impractical. The quality result validates
      the protocol; faster crypto (CKKS, SMPC) could make it practical.
      Used python-paillier (data61) with gmpy2 acceleration and batch packing.

      '
