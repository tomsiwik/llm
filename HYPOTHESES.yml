      utterance 1-NN, utterance aggregated. All semantic strategies achieve
      91-97% cluster accuracy but only 20-27% domain accuracy. The within-cluster
      discrimination problem is information-limited at micro scale: Markov chain
      domains differ by only ~7.5% in transition probabilities, compressing to
      ~1 bit in stationary distribution (need 2.32 bits for 5-way classification).
      Latency is a non-issue: all <6us. Recommendation: hierarchical routing
      (cluster via cosine/utterance, hash within cluster). May succeed at macro
