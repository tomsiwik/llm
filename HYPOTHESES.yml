    tags:
    - distillation
    - pipeline
    - macro
    - critical-path
    created: '2026-03-07'
    notes: >
      THE FIRST MILESTONE. Build automated pipeline:
      (1) Domain taxonomy generation via cheap model
      (2) Training data generation via Groq batch API (Llama 3.3 70B, $0.19/expert)
      (3) QLoRA training on RunPod A5000 with Unsloth (~15 min/expert)
      (4) compose add + hash ring registration
      (5) Benchmark vs base model on domain-relevant eval sets.

      Base model: Qwen2.5-7B (4-bit). LoRA: rank-16, all projections.
      Budget: ~$13 for 50 experts. Use remaining budget for eval.

      Domain selection for pilot: 10 programming languages, 10 science subfields,
      10 professional domains, 10 writing styles, 10 reasoning types.

      Research first: Use /notebooklm to survey large-scale LoRA distillation
