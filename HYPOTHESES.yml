  # ── Base-Free Training Path ─────────────────────────────────────

  exp_relora_from_scratch_composition:
    title: Train a base model from scratch via ReLoRA and compose experts on it
    status: supported
    scale: macro
    priority: 2
    depends_on:
    - exp_relora_composition_test
    blocks:
    - exp_full_base_free_pipeline
    experiment_dir: macro/relora_from_scratch
    kill_criteria:
    - ReLoRA-from-scratch base quality >20% worse than conventional pretrained base at same FLOP budget
    - experts on ReLoRA base show cos >5x worse than experts on pretrained base
    - ReLoRA training diverges or requires careful hyperparameter tuning (not reproducible)
    evidence:
    - 'micro: ReLoRA base loss ratio 1.046, cos ratio 1.77x (p=0.056 n.s.)'
    - 'Lialin et al. 2023: ReLoRA matches conventional pretraining at 350M-1.3B scale'
    - 'macro: GPT-2-124M from scratch. cos_ratio=0.875x (ReLoRA MORE orthogonal), loss_ratio=1.122, base_ratio=1.121. All kill criteria disproven. K4 no divergence (16 cycles monotonic improvement). ReLoRA composition penalty ~0.1% (loss gap entirely from base quality). Date: 2026-03-14.'
    tags:
    - architecture
    - base-freedom
    - novel
    - critical-path
    created: '2026-03-11'
    notes: >
      THE BASE-FREE PATH. If a model can be built entirely from iterative
      low-rank updates (ReLoRA), then the base itself is just accumulated
      LoRA merges. This means:
      (1) No sacred pretrained weights — the base can be evolved
      (2) Base improvements = merge more LoRA updates (same mechanism as experts)
      (3) The entire model is a composition of rank-r updates

      Test at macro scale (Qwen2.5-0.5B equivalent):
      (a) Train ReLoRA base from scratch (K=50-200 merge cycles)
      (b) Train 5 domain experts on the ReLoRA base
      (c) Compare composition quality vs same experts on conventional base
      (d) Measure orthogonality preservation

      ReLoRA paper showed it works at 350M-1.3B scale for pretraining.
      We need to verify it works for the composition use case specifically.

      Research first: Use /notebooklm to survey ReLoRA implementations
      (original codebase, any HuggingFace reproductions), LTE parallel
      training approaches, and any base-free model construction literature.

  exp_full_base_free_pipeline:
    title: End-to-end base-free SOLE — from random init to serving via LoRA only
    status: active
    scale: macro
    priority: 4
    depends_on:
    - exp_relora_from_scratch_composition
    - exp_distillation_pilot_50
    blocks: []
    experiment_dir: macro/full_base_free_pipeline
    kill_criteria:
    - base-free model >10% worse than conventional SOLE on average across 10+ domains
    - base-free model >2x slower to construct than conventional pretraining + expert distillation
    - system has any component that is NOT a composable adapter
    evidence:
    - 'macro experiment submitted to GPU queue (run_full_base_free_1773517079). GPT-2 124M, 12 domains, ReLoRA base + expert LoRA composition. Reuses cached bases from exp_relora_from_scratch. Date: 2026-03-14.'
    tags:
    - architecture
    - base-freedom
    - pipeline
    - novel
    - critical-path
    created: '2026-03-11'
    notes: >
      THE ULTIMATE TEST. Build a complete SOLE model where EVERYTHING
      is a composable adapter:

      Step 1: Random skeleton (attention architecture + embeddings)
      Step 2: ReLoRA or LTE → "base adapter" (general language knowledge)
      Step 3: Distill 50+ domain experts via teacher
      Step 4: Compose: skeleton + base_adapter + sum(expert_i)/N
      Step 5: Route and serve

      Every component is swappable:
      - Upgrade base: swap base_adapter (no expert retraining needed)
      - Add domain: add expert_i
      - Remove domain: subtract expert_i
      - Upgrade skeleton: Procrustes alignment of all adapters

      This is the "no sacred weights" vision realized.

