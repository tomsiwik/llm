  exp_hash_ring_remove_expert:
    title: Expert removal via consistent hash ring (graceful degradation)
    status: proven
    scale: micro
    priority: 3
    depends_on: []
    blocks:
    - exp_clone_compete_evolution
    experiment_dir: micro/models/hash_ring_remove_expert
    kill_criteria:
    - '>5% degradation when removing one expert from N=8 without recalibration'
    - removed expert tokens not redistributed to nearest neighbor (>20% go to non-neighbor)
    evidence:
    - date: '2026-03-14'
      claim: 'K1 PASS: mean degradation -2.23%, max -4.53% (threshold 5%) at N=8. K2 PASS: 100% neighbor accuracy (threshold 80%). Zero false moves, perfect add-remove symmetry.'
      source: micro/models/hash_ring_remove_expert/PAPER.md
      review: 'Adversarial review PROCEED (2026-03-14). Two non-blocking fixes: correct MATH.md N=4 value, strengthen neighbor accuracy verification.'
    tags:
    - routing
    - consistent-hashing
    - fault-tolerance
    - critical-path
    created: '2026-03-06'
    notes: >
      REQUIRED for evolution phase. Clone-and-compete needs expert removal
      (prune the loser). Add-expert validated at +0.20% / 9.1% displacement.
      Remove-expert is the dual operation: removing one expert should redistribute
      only its ~1/N tokens to the next clockwise neighbor.

      Research first: Use /notebooklm to survey consistent hashing literature
      (Karger et al., jump hash, maglev hashing) for removal guarantees.
      Also check virtual node strategies for load balancing after removal.

  exp_hash_function_load_balance:
    title: xxHash/MurmurHash3 reduces hash ring load imbalance vs FNV1a
    status: open
    scale: micro
    priority: 5
    depends_on:
    - exp_hash_ring_remove_expert
    blocks: []
    experiment_dir: null
    kill_criteria:
    - 'xxHash/MurmurHash3 load imbalance >= FNV1a 1.8x at N=8 (hash function is not the problem)'
    - 'imbalance with any hash function > 1.3x at N>=16 with V>=200 virtual nodes'
    evidence: []
    tags:
    - routing
    - consistent-hashing
    - optimization
    created: '2026-03-14'
    notes: >
      Hash ring removal experiment showed FNV1a produces 1.8x load imbalance
      at N=8 (expert 2 handles 38.7% vs theoretical 25%). This directly drives
      quality degradation above 5% at N=4. xxHash or MurmurHash3 may produce
      better uniformity. Low priority — only matters if N stays small.

  # ── Phase 3: Evolve ──────────────────────────────────────────────

  exp_clone_compete_evolution:
    title: Clone-and-compete expert evolution mechanism
    status: active
    scale: macro
    priority: 2
    depends_on:
    - exp_distillation_pilot_50
    - exp_hash_ring_remove_expert
    blocks:
    - exp_evolution_convergence
    experiment_dir: null
    kill_criteria:
    - corrected clone does not win tournament >70% of the time (corrections don't help)
    - tournament requires >50K queries to resolve (too slow for practical evolution)
    - original expert domains regress >2% during tournament (competition causes interference)
    evidence: []
    tags:
    - evolution
    - clone-compete
    - feedback-loop
    - novel
    - critical-path
    created: '2026-03-07'
    notes: >
      THE KEY INNOVATION. When an expert produces wrong output:
      (1) Clone expert → fine-tune clone with correction (50-100 steps, ~30 sec)
      (2) Register both on hash ring (clone gets ~1/(N+1) traffic)
      (3) Shadow scoring: when original selected, also score clone on same input
      (4) Compare per-token perplexity over ~1K-10K queries
      (5) Prune the loser

      Test protocol: take 5 experts from pilot, inject deliberate errors,
      provide corrections, measure tournament convergence rate and speed.

      Controls: max 3 concurrent clones per domain, 10K query tournament timeout.

      This requires exp_hash_ring_remove_expert for pruning the loser.

      Research first: Use /notebooklm to survey evolutionary model merging
      (Sakana AI "Evolutionary Optimization of Model Merging Recipes"),
      continual learning via adapter competition, and online learning for LLMs.
      Key question: has anyone done clone-and-compete for LoRA experts specifically?

  exp_shadow_scoring:
    title: Shadow scoring for fair expert A/B comparison
    status: supported
    scale: micro
    priority: 2
    depends_on: []
    blocks:
    - exp_clone_compete_evolution
    experiment_dir: micro/models/shadow_scoring
    kill_criteria:
    - shadow scoring overhead >5% of inference latency
    - shadow perplexity does not correlate with actual serving quality (r² < 0.5)
    evidence:
    - K1 PASS (3/3 seeds): overhead 91.7% at micro (full-rank, expected); projected 1.9% at macro (rank-16 LoRA d=896)
    - K2 PASS (3/3 seeds): per-comparison accuracy 0.916 +/- 0.017 (all seeds > 0.866)
    - K3 supplementary (ranking convergence): tau -0.067 +/- 0.340 (poor, but expected at N=5 with similar-quality experts)
    - 5 seeds total (d=32 seeds 42/123/456, d=64 seeds 42/123), all K1/K2 pass
    - Per-comparison accuracy is the right metric for clone-and-compete (binary comparison, not global ranking)
    tags:
    - evolution
    - evaluation
    - shadow-scoring
    - critical-path
    created: '2026-03-07'
    notes: >
      Shadow scoring computes a challenger expert's answer-conditioned PPL
      alongside the incumbent on live traffic. Elo ratings aggregate comparisons.

      Key finding: per-comparison accuracy (0.916) is consistently high across
      seeds, but global ranking convergence (tau ~0) is poor. This is expected:
      ranking N=5 experts with similar averages requires O(1/epsilon^2) samples
      per pair. For clone-and-compete (binary comparison on domain traffic),
      per-comparison accuracy is what matters, and 92% is more than sufficient.

      Overhead at macro: 1.9% compute (0% user-facing latency with async).
      With 10% shadow rate: 0.19% compute overhead. Well below 5% kill threshold.

      MATH.md has full information-theoretic analysis of sample complexity.
      PAPER.md has complete results across 5 seeds and 2 model sizes.

  exp_evolution_convergence:
    title: Continuous evolution improves model quality monotonically
    status: open
    scale: macro
    priority: 5
    depends_on:
    - exp_clone_compete_evolution
    blocks: []
    experiment_dir: null
    kill_criteria:
    - model quality does not improve after 10 evolution cycles (corrections don't accumulate)
    - quality oscillates (winner of cycle N loses to loser of cycle N-2)
    - expert lineage diverges (v5 is worse than v1 on original domain)
    evidence: []
    tags:
    - evolution
    - convergence
    - macro
    created: '2026-03-07'
    notes: >
      The ultimate test: does the living model actually get better over time?

      Protocol: run 10 evolution cycles on 5 experts. Each cycle:
      (1) Evaluate all experts on domain-specific held-out set
      (2) Generate corrections using 70B teacher for worst-performing queries
      (3) Clone-and-compete
      (4) Measure quality after tournament resolves

      Plot quality curve over cycles. Must be monotonically improving.
      If quality oscillates, the correction signal is noisy or the tournament
      is not selecting the right winner. If quality plateaus, corrections
      have diminishing returns (expert capacity saturated).

      Research first: Use /notebooklm to survey continual learning convergence
      guarantees, online learning regret bounds, and RLHF iteration stability.
      Check if DPO-style updates have monotonic convergence properties.

  exp_automated_correction_pipeline:
    title: Automated correction generation from teacher model
    status: active
    scale: macro
    priority: 4
    depends_on:
    - exp_distillation_pilot_50
    blocks:
    - exp_clone_compete_evolution
    experiment_dir: macro/automated_correction_pipeline
    kill_criteria:
    - teacher-generated corrections are wrong >20% of the time (teacher unreliable)
    - automated corrections improve expert quality <50% as much as human corrections
    evidence:
    - date: '2026-03-14'
      claim: 'Experiment script written and submitted to GPU queue. 5 domains, 70B teacher via Groq API, dual kill criteria (teacher reliability + correction effectiveness).'
      source: macro/automated_correction_pipeline/run_correction_pipeline.py
    tags:
    - distillation
    - correction
    - automation
    - critical-path
    created: '2026-03-07'
    notes: >
      The evolution loop needs automated correction sources. Pipeline:
      (1) Serve queries through composed model, log (input, output, expert_ids)
      (2) Sample outputs, send to 70B teacher: "Is this correct? If not, provide correction"
      (3) Filter: only keep corrections where teacher confidence is high
      (4) Feed corrections into clone-and-compete pipeline

      Cost: ~$0.001 per judged query (70B, ~1K tokens).
      At 1000 queries/day: $1/day for continuous improvement.

      For code domains: use execution-based validation (run the code, check output).
      Free and perfect signal. No teacher needed.

      Research first: Use /notebooklm to survey LLM-as-judge reliability
      (MT-Bench, AlpacaEval), automated correction pipelines (Constitutional AI,
      RLAIF), and self-play approaches (Self-Instruct, WizardLM Evol-Instruct).

  # ── Composable Architecture Research ─────────────────────────────

  exp_gram_schmidt_composition:
    title: Gram-Schmidt orthogonalization preserves expert quality at merge
    status: proven
    scale: micro
    priority: 1
    proven_date: '2026-03-11'
    depends_on: []
    blocks:
    - exp_collision_scaling
    - exp_composable_merge_pipeline
    experiment_dir: null
    kill_criteria:
    - orthogonalized expert loses >10% PPL improvement vs non-orthogonalized
    - Gram-Schmidt projection removes >50% of expert signal (too aggressive)
    evidence:
    - date: '2026-03-10'
      claim: 'math-medical cosine=0.70 confirms non-orthogonal pairs exist at N=5'
      source: 'composer/orthogonality.py run on 5 trained adapters'
    - date: '2026-03-11'
      claim: 'GS preserves >99.67% signal retention across all experts (KC2 clean pass). GS Avg vs Simple Avg: -2.58% vs -2.56% improvement over base (indistinguishable). GS is unnecessary because deltas are already near-orthogonal.'
      source: 'micro/models/gram_schmidt_composition/PAPER.md'
    - date: '2026-03-11'
      claim: 'Adversarial review: PROCEED. Math sound, negative result (GS unnecessary) is the key finding. Simple averaging confirmed as optimal merge strategy.'
      source: 'micro/models/gram_schmidt_composition/REVIEW-adversarial.md'
    tags:
    - composition
    - orthogonality
    - novel
    - critical-path
    created: '2026-03-10'
    notes: >
      CRITICAL: math-medical pair has cosine 0.70. Before adding expert k,
      project out its component along all existing experts:
      A_k' B_k' = A_k B_k - sum_{i<k} proj(A_k B_k, A_i B_i)
      This preserves only the NOVEL contribution.

      Test: take our 5 trained experts (bash, math, medical, python, sql).
      Orthogonalize math against medical. Measure if both still beat base PPL.

      References: references/infolora-continual/ (orthogonality constraints).
      Use /notebooklm to find Gram-Schmidt implementations for LoRA merging.

  exp_collision_scaling:
    title: Non-orthogonal collision rate as function of expert count N
    status: supported
    scale: micro
    priority: 2
    depends_on:
    - exp_gram_schmidt_composition
    blocks:
    - exp_composable_merge_pipeline
    experiment_dir: micro/models/collision_scaling
    kill_criteria:
    - collision rate (cos>0.1) grows superlinearly with N (architecture-breaking)
    - '>30% of pairs have cosine >0.1 at N=20 (clusters dominate)'
    evidence:
    - 'K1 DISPROVEN: collision rate DECREASES with N. Power law beta=-0.575, R^2=0.922'
    - 'K2 DISPROVEN: at N=20, collision rate=1.23% (24x below 30% threshold)'
    - 'Collisions exclusively within-cluster (99.97%). Cross-cluster rate ~0%'
    - 'O(1/N) scaling: within-cluster pairs O(N), total pairs O(N^2)'
    - 'CAVEAT: requires cluster diversity -- if K fixed, within-cluster is O(N^2)'
    tags:
    - composition
    - scaling
    - orthogonality
    - cross-domain
    - novel
    created: '2026-03-10'
    notes: >
      Train 20 diverse LoRA experts (rank-8, FFN-only). Domains: 5 programming
      languages, 5 sciences, 5 professional, 5 creative/reasoning.
      Measure full 20x20 pairwise cosine matrix. Plot collision distribution.

      Key question: does collision rate grow sublinearly (manageable) or
      superlinearly (architecture-breaking)? Adversarial review predicts
      20-40% of pairs above cos 0.1 at N=50.

      Use Groq batch API for data generation ($0.02/expert at 8B).
      Train on RunPod A5000 (~14 min/expert, rank-8 FFN-only).

  exp_semantic_router:
    title: Learned semantic router vs hash ring for expert selection
    status: killed
    scale: micro
    priority: 3
    depends_on: []
    blocks: []
    experiment_dir: micro/models/semantic_router
    kill_criteria:
    - semantic router accuracy <70% on domain classification
    - router latency >5ms per query (too slow for production)
    - router adds >2% end-to-end latency vs hash ring
    evidence:
    - "K1 KILL: best domain acc 27.3% (keyword_freq) < 70% threshold (3 seeds)"
    - "K2 PASS: all strategies <6us/query, well under 5ms"
    - "K3 PASS: best semantic 5.74us < 10us (2% of 500us inference)"
    - "Cluster acc 97.1% (utterance 1-NN) confirms inter-cluster routing trivially solved"
