    - "Kill criterion 1 SURVIVES: ReLoRA, LTE, full-rank can encode base knowledge"
    - "Kill criterion 2 SURVIVES: ReLoRA/LTE train from scratch without frozen base"
    - "LoRA confirmed as optimal for composable architecture (FIT=0.875)"
    - "Three composition classes: A (additive/LoRA), B (caveats/DoRA,MoLoRA), C (incompatible/IA3,Houlsby,Prefix)"
    - "No base-free composable model exists in published literature — our opportunity"
    - "HuggingFace Hub: LoRA dominates >90% of adapters in production"
    - date: '2026-03-11'
      claim: "Adversarial review passed (revision). All 4 required fixes + 3 advisory items verified."
