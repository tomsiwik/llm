    - survey
    - novel
    - cross-domain
    - critical-path
    created: '2026-03-11'
    notes: >
      FOUNDATIONAL QUESTION: We assume a frozen base + LoRA experts. But
      what if the "base" itself could be an adapter? What adapter types
      exist and which are best suited for a composable architecture?

      Survey and classify:
      (a) LoRA / QLoRA / DoRA / rsLoRA — low-rank additive
      (b) IA3 / (IA)^3 — learned rescaling vectors
      (c) Adapters (Houlsby) — bottleneck layers inserted between blocks
      (d) Prefix tuning / prompt tuning — virtual token prepending
      (e) BitFit — bias-only tuning
      (f) Full-rank adapters — complete layer replacement
      (g) Mixture-of-LoRAs (MoLoRA) — already MoE-native
      (h) LoRA-XS, VeRA, Tied-LoRA — parameter-efficient variants
      (i) HuggingFace PEFT ecosystem — what's actually used in production

      For EACH type evaluate:
      - Can it compose additively? (orthogonality property)
      - What is its capacity (bits of knowledge per parameter)?
      - Can it encode "base-level" knowledge or only deltas?
      - What's the inference overhead?
      - What exists on HuggingFace Hub right now?

      Research first: Use /notebooklm to survey the full PEFT/adapter
      landscape. Check HuggingFace Hub for adapter collections. Survey
      AdapterHub, LoRAHub, and OpenDelta for composition patterns.
      Key question: has anyone built a base-free modular model?

