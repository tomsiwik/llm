      (b) Sample-based: eval random subset of existing experts after each add
      (c) Cosine-based gate: only eval experts with cosine >threshold to new one
      (d) Canary queries: fixed set of regression tests per domain

      Implement and compare detection rate vs cost. Option (c) is most
      promising — only check potentially-affected experts.

      Research first: Use /notebooklm to survey regression detection in
      continual learning (backward transfer metrics, forgetting measures),
      and ML model monitoring (data drift detection, performance monitoring).

