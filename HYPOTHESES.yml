  exp_hash_function_load_balance:
    title: xxHash/MurmurHash3 reduces hash ring load imbalance vs FNV1a
    status: supported
    scale: micro
    priority: 5
    depends_on:
    - exp_hash_ring_remove_expert
    blocks: []
    experiment_dir: micro/models/hash_function_load_balance
    kill_criteria:
    - xxHash/MurmurHash3 load imbalance >= FNV1a 1.8x at N=8 (hash function is not the problem)
    - imbalance with any hash function > 1.3x at N>=16 with V>=200 virtual nodes
    evidence:
    - date: '2026-03-18'
      claim: 'K1 PASS: xxHash32 mean R=1.170 vs FNV1a 2.175 at N=8 (1.86x improvement).
        FNV1a is catastrophically bad (2-5x imbalance at all scales). K2 technically
        KILL (73 violations at V=200, of which 37 non-FNV1a), but all good hashes
        < 1.3x at V>=500. Status supported (not proven) because K2 triggered at original
        V=200 threshold. Recommendation: xxHash32 + V>=500 virtual nodes.
        360 configs (5 hashes x 6 N x 4 V x 3 seeds), 1M queries each.
        MurmurHash3 comparable (R=1.176 at N=8). SHA-256 slightly worse (R=1.255).
        Jain fairness: xxHash32 0.999 vs FNV1a 0.938 at V=500/N=8.
        Adversarial review: PROCEED (2026-03-18).'
      source: micro/models/hash_function_load_balance/results_summary.json
    tags:
    - routing
    - consistent-hashing
    - optimization
    created: '2026-03-14'
    notes: "FNV1a hash replaced by xxHash32 as SOLE default. V increased from 150 to 500.\
      \ At V=500/xxHash32: R < 1.20 for N<=32, R < 1.27 for N<=128. FNV1a structural\
      \ correlation with sequential expert IDs causes persistent arc clustering that\
      \ cannot be fixed by increasing V.\n"
  exp_clone_compete_evolution:
    title: Clone-and-compete expert evolution mechanism
    status: killed
    scale: macro
    priority: 2
    depends_on:
    - exp_distillation_pilot_50
    - exp_hash_ring_remove_expert
    blocks: []
    experiment_dir: macro/clone_compete_evolution
    kill_criteria:
    - corrected clone does not win tournament >70% of the time (corrections don't help)
    - tournament requires >50K queries to resolve (too slow for practical evolution)
    - original expert domains regress >2% during tournament (competition causes interference)
    evidence:
    - date: '2026-03-22'
      claim: 'KILLED by micro replication (exp_bitnet_clone_compete_powered): clone wins only 28.9%
        per-sample at N=500 (p<0.0001 below 50%). Cold-start matches clone aggregate PPL. Warm-start
        inheritance is illusory. Superseded by exp_bitnet_retrain_evolve (retrain-from-scratch + quality gate).'
      source: micro/models/bitnet_clone_compete_powered/PAPER.md
    tags:
    - evolution
    - clone-compete
    - feedback-loop
    - novel
    - killed
    created: '2026-03-07'
    notes: "THE KEY INNOVATION. When an expert produces wrong output: (1) Clone expert \u2192 fine-tune clone with correction\
      \ (50-100 steps, ~30 sec) (2) Register both on hash ring (clone gets ~1/(N+1) traffic) (3) Shadow scoring: when original\
      \ selected, also score clone on same input (4) Compare per-token perplexity over ~1K-10K queries (5) Prune the loser\n\
      Test protocol: take 5 experts from pilot, inject deliberate errors, provide corrections, measure tournament convergence\
      \ rate and speed.\nControls: max 3 concurrent clones per domain, 10K query tournament timeout.\nThis requires exp_hash_ring_remove_expert\
      \ for pruning the loser.\nResearch first: Use /notebooklm to survey evolutionary model merging (Sakana AI \"Evolutionary\
      \ Optimization of Model Merging Recipes\"), continual learning via adapter competition, and online learning for LLMs.\
      \ Key question: has anyone done clone-and-compete for LoRA experts specifically?\n"
  exp_evolution_convergence:
    title: Continuous evolution improves model quality monotonically
    status: open
    scale: macro
    priority: 5
    depends_on:
    - exp_bitnet_retrain_evolve
    blocks: []
    experiment_dir: null
    kill_criteria:
    - model quality does not improve after 10 evolution cycles (corrections don't accumulate)
    - quality oscillates (winner of cycle N loses to loser of cycle N-2)
    - expert lineage diverges (v5 is worse than v1 on original domain)
    evidence: []
    tags:
    - evolution
    - convergence
    - macro
    created: '2026-03-07'
    notes: 'The ultimate test: does the living model actually get better over time?
      CONDITIONALLY UNBLOCKED: retrain-from-scratch mechanism works at PPL level (4.4x
      improvement, supported). Gate calibration needs revision before convergence testing:
      use PPL primary + KR non-regression + cos<0.05 instead of original strict gate.
      KR-Test needs n~540 for 80% power at delta=0.03 (not n=200 as originally claimed).

      Protocol: run 10 evolution cycles on 5 experts. Each cycle: (1) Evaluate all experts on domain-specific held-out set
      (2) Generate corrections using 70B teacher for worst-performing queries (3) Clone-and-compete (4) Measure quality after
      tournament resolves

      Plot quality curve over cycles. Must be monotonically improving. If quality oscillates, the correction signal is noisy
      or the tournament is not selecting the right winner. If quality plateaus, corrections have diminishing returns (expert
      capacity saturated).

      Research first: Use /notebooklm to survey continual learning convergence guarantees, online learning regret bounds,
      and RLHF iteration stability. Check if DPO-style updates have monotonic convergence properties.

      '
  exp_minimum_viable_base:
    title: Minimum base model size for effective expert composition
    status: supported
    scale: micro
    priority: 3
    depends_on: []
    blocks: []
    experiment_dir: micro/models/minimum_viable_base
    kill_criteria:
    - base <1.5B cannot support expert composition (PPL improvement <5%)
    - expert quality scales linearly with base size (no sweet spot)
    evidence:
    - date: '2026-03-10'
      claim: rank-8 FFN-only on 7B gives PPL 1.59 for bash (near rank-128 at 1.50)
      source: rank sweep experiment on RunPod
    - date: '2026-03-07'
      claim: 0.5B base too weak for expert composition (killed prior experiment)
      source: micro experiment archive
    - date: '2026-03-16'
      claim: 'REVISED per adversarial review. (1) K1 NOT TESTABLE -- measures geometry not PPL. (2) N_max analytical
        estimates flagged as extrapolated, not measured. (3) Random baseline added: LoRA cosines within 5-13% of random
        vectors -- orthogonality is from dimensionality, not structure. (4) Phase transition renamed to saturation points.
        Core finding stands: geometric interference is not the bottleneck at any d.'
      source: micro/models/minimum_viable_base/PAPER.md
    - date: '2026-03-16'
      claim: 'Adversarial review PROCEED (revision). |cos|~1/sqrt(D_flat) confirmed (beta=-0.506,
        R2=0.997). Random baseline proves orthogonality from dimensionality not structure
        (LoRA/random ratio 0.93-1.13). K1 NOT TESTABLE, K2 marginally survives. All-modules
        > FFN-only at every d. D_flat >> d^2 means N_max formula is conservative lower bound.'
      source: micro/models/minimum_viable_base/REVIEW-adversarial.md
    tags:
    - composition
    - scaling
    - base-model
    created: '2026-03-10'
    notes: 'The base provides attention wiring + embeddings. Experts provide domain FFN. How small can the base be before
      composition breaks?

      Test rank-8 FFN-only experts on: Qwen2.5-0.5B, 1.5B, 3B, 7B. Same training data, same domains. Measure PPL improvement
      per base size.

      Sweet spot is likely 1.5-3B: big enough for attention quality, small enough for fast inference. Prior work killed 0.5B.

      Research first: Use /notebooklm to survey base model size vs adapter effectiveness (LoRA papers across model sizes,
      Phi-style small models, TinyLlama). Check references/tiny-aya-parallel/ for small-model multi-lingual LoRA approaches.

      '
  exp_execution_based_self_learning:
    title: Code experts self-improve via execution feedback loop
    status: supported
    scale: micro
    priority: 3
    depends_on:
    - exp_ppl_vs_task_performance
    blocks: []
    experiment_dir: micro/models/execution_based_self_learning
    kill_criteria:
    - self-learning loop does not improve pass@1 after 5 cycles
    - generated training data quality degrades over cycles (model collapse)
    evidence:
    - date: '2026-03-16'
      claim: 'K1 PASS: DPO +23.0pp pass@1 after 5 cycles (SFT +11.2pp), advantage 2.06x (1.91x parametric input).
        K2 CONDITIONAL: collapse at cycle 18-19 (SFT) / 26-27 (DPO) under accelerating decay; safe under constant decay.
        Critical acceleration threshold ~8%/cycle. 50% fresh data prevents collapse. K=3 optimal (diminishing returns above).
        K does NOT affect collapse timing. Simulation calibrated from SPIN/ReST-EM/CodeRL/Shumailov.
        Adversarial review: PROCEED (2026-03-16, revision 2). Status: SUPPORTED (simulation, not empirical).'
      source: micro/models/execution_based_self_learning/PAPER.md
    tags:
    - evolution
    - self-learning
    - code
    - novel
    - critical-path
    created: '2026-03-11'
    notes: "For code domains, execution IS the oracle. No teacher needed.\nLoop: (1) Expert generates K solutions per MBPP\
      \ problem (2) Execute each against test cases (3) Passing solutions \u2192 new training data (4) Retrain expert on combined\
      \ original + passing data (5) Measure pass@1 improvement (6) Repeat\nAlso test DPO variant: use (pass, fail) pairs as\
      \ (chosen, rejected). DPO should be stronger because it teaches what NOT to do.\nWatch for model collapse: if the expert\
      \ only trains on its own outputs, diversity may decrease. Track output diversity across cycles.\nResearch first: Use\
      \ /notebooklm to survey self-play and self-improvement for code LLMs (AlphaCode, CodeRL, RLTF, Self-Debugging). Check\
      \ StarCoder self-improvement and Reflexion for execution-feedback loops.\n"
  exp_quality_degradation_detection:
    title: Detect when adding expert N degrades expert M
    status: supported
    scale: micro
    priority: 4
    depends_on:
    - exp_gram_schmidt_composition
    blocks: []
    experiment_dir: micro/models/quality_degradation_detection
    kill_criteria:
    - detection method has >20% false negative rate (misses real degradation)
    - detection adds >10 min to merge pipeline
    evidence:
    - date: '2026-03-15'
      claim: 'Canary queries (20 examples/expert) achieve FNR=9.8%, FPR=3.1%, projected 6.8s at N=500. Both kill criteria
        pass. Key surprise: cosine similarity is ANTI-correlated with degradation (Pearson r=-0.46, Spearman rho=-0.44 at
        d=64). Low-cosine experts degrade MORE, not less. Cosine-based gating at tau>0.1 has FNR=35.5%. At production scale
        (d=896, cos~0.0002), degradation is near-zero due to structural orthogonality. Detection is insurance, not routine.

        '
      source: micro/models/quality_degradation_detection/results.json
    - date: '2026-03-17'
      claim: 'REVISION: Full config rerun (d=64, N=8, 3 seeds, 15-20 epochs). results.json
        now matches PAPER.md. Canary FNR=2.0% +/- 0.1% (95% CI [1.9%, 2.1%]), FPR=6.6%.
        Anti-correlation Pearson r=-0.41 (95% CI [-0.50, -0.31]). Cosine>0.10 gating
        FNR=33.8% (key negative result). Paradox reconciled: degradation ~ f(rho)*g(cos).
        Status downgraded to supported per reviewer.'
      source: micro/models/quality_degradation_detection/results.json
    tags:
    - composition
    - safety
    - monitoring
    created: '2026-03-11'
    notes: "Reviewer attack: \"At N=500, there are 124,750 pairwise interactions. How do you verify expert #347 hasn't subtly\
      \ degraded expert #12?\"\nOptions: (a) Full pairwise eval (O(N\xB2), too expensive at scale) (b) Sample-based: eval\
      \ random subset of existing experts after each add (c) Cosine-based gate: only eval experts with cosine >threshold to\
      \ new one (d) Canary queries: fixed set of regression tests per domain\nImplement and compare detection rate vs cost.\
      \ Option (c) is most promising \u2014 only check potentially-affected experts.\nResearch first: Use /notebooklm to survey\
      \ regression detection in continual learning (backward transfer metrics, forgetting measures), and ML model monitoring\
      \ (data drift detection, performance monitoring).\n"
  exp_expert_removal_graceful:
    title: Removing an expert from merged model doesn't break others
    status: supported
    scale: micro
    priority: 4
    depends_on:
    - exp_gram_schmidt_composition
    blocks: []
    experiment_dir: micro/models/expert_removal_graceful
    kill_criteria:
    - removing expert causes >3% PPL regression on remaining experts
    - Gram-Schmidt cascade recomputation takes >10 min at N=50
    evidence:
    - 'K1 CONDITIONAL PASS: Near-orthogonal regime (cos~0.001, SOLE production): naive subtraction recon error 0.18% max,
      per-expert regression 0.0022% max. Clustered cos=0.3: recon error 10.1% but per-expert regression 3.6% at N=10 only.
      At N>=20, regression < 2.8%. Date: 2026-03-15.'
    - 'K2 PASS: GS recompute 1.06s at N=50, 14.8s at N=200. Kill threshold (10 min) not reached until ~N=1600. Date: 2026-03-15.'
    - 'KEY FINDING: Two regimes. cos<0.01 -> naive O(1) subtraction sufficient (<0.2% error, 2000x speedup). cos>0.1 -> GS
      recompute required but cheap (<2s at N=50). SOLE operates in the naive-sufficient regime. Date: 2026-03-15.'
    - 'Position sensitivity: removing first expert in GS order = worst case (24.3% error). Last expert = zero error. Production
      clone-compete removes recent clones (late position, low error). Date: 2026-03-15.'
    - date: '2026-03-15'
      claim: 'Adversarial review: PROCEED. Status downgraded to supported (PPL never measured, only reconstruction error proxy).
        Three non-blocking fixes: (1) Lipschitz claim overstated in MATH.md, (2) attention-layer cosine risk (cos=0.85) not
        acknowledged, (3) code K1 aggregate check incorrect (prints KILL due to stress tests).

        '
      source: micro/models/expert_removal_graceful/REVIEW-adversarial.md
    tags:
    - composition
    - safety
