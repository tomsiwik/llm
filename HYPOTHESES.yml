  exp_gap_causal_mechanism:
    title: 'Causal mechanism: gap magnitude drives router gradient magnitude'
    status: proven
    scale: micro
    priority: 4
    depends_on:
    - exp_gap_as_signal
    blocks: []
    experiment_dir: micro/models/gap_causal_mechanism
    kill_criteria:
    - router gradient magnitude does NOT correlate with gap magnitude (r² < 0.3)
    - equal gradient magnitudes at cos=0.0 and cos=0.9
    evidence:
    - 'KC1 PARTIAL: CE gap vs gradient r²=0.24 (pooled, FAIL), but cosine vs gradient r²=0.63 (mean curve, PASS)'
    - 'KC2 PASS: gradient ratio cos=0.0/cos=0.9 = 15.5x (far exceeds 10% threshold)'
    - 'KEY FINDING: CE gap and router gradient are NEGATIVELY correlated — gap is NOT the gradient signal'
    - 'The real mechanism is expert discriminability: orthogonal experts produce different outputs per token, giving stronger
      router gradients'
    - 'Phase transition at cos~0.5-0.7: gradients flat at ~0.17 for cos<=0.5, collapse to 0.01 at cos=0.9'
    - 'Corrected causal chain: cos -> discriminability -> gradient -> quality (r²=0.63, 0.75 on mean curve)'
    - 'Gap-as-signal reframed: the gap is a SYMPTOM not a CAUSE; discriminability is the actual gradient driver'
    tags:
    - gap-as-signal
    - routing
    - mechanistic
    created: '2026-03-07'
    notes: 'Original hypothesis partially confirmed, partially refined. The gap between composed and joint is NOT the gradient
      signal (negative correlation). The actual mechanism is expert discriminability: when expert outputs differ per token,
      the router gets strong gradients. Orthogonal experts maximize discriminability. This refines the gap-as-signal framing
      in VISION.md: the conclusion (orthogonal is better) is correct, but the mechanism (gap drives gradients) is wrong —
      discriminability drives gradients, and the gap is a downstream symptom.'
