nodes:
  # ── Phase 1: Distill ──────────────────────────────────────────────

  exp_distillation_pilot_50:
    title: 50-expert distillation pipeline end-to-end
    status: supported
    scale: macro
    priority: 6
    depends_on: []
    blocks:
    - exp_clone_compete_evolution
    - exp_scale_500_experts
    experiment_dir: micro/models/distillation_pilot_50
    kill_criteria:
    - composed 50-expert model does not beat base on >80% of expert domains (MMLU subsets or HumanEval)
    - distilled experts show <2% improvement over base on their own domain (distillation failed)
    - pipeline cost exceeds $0.50/expert (economics don't scale)
    evidence:
    - date: '2026-03-13'
      claim: "Pipeline validated: 98% win rate (49/50), 42.2% PPL improvement on training data (contaminated eval -- see PAPER.md caveat), $0.44/expert. Only SQL regressed (-21.4%). Downstream task evaluation (MMLU/HumanEval) pending."
      source: results/pilot50_benchmark.json
    - date: '2026-03-13'
      claim: "Adversarial review PROCEED (re-review). All 3 REVISE fixes verified: contamination caveat in PAPER.md, status supported in HYPOTHESES.yml, limitations rewritten. Non-blocking: SQL failure investigation, cost discrepancy, missing variance, PPL-to-task gap."
      source: micro/models/distillation_pilot_50/REVIEW-adversarial.md
    tags:
    - distillation
    - pipeline
    - macro
    - critical-path
    created: '2026-03-07'
    notes: >
      THE FIRST MILESTONE. Build automated pipeline:
      (1) Domain taxonomy generation via cheap model
      (2) Training data generation via Groq batch API (Llama 3.3 70B, $0.19/expert)
      (3) QLoRA training on RunPod A5000 with Unsloth (~15 min/expert)
      (4) compose add + hash ring registration
      (5) Benchmark vs base model on domain-relevant eval sets.

      Base model: Qwen2.5-7B (4-bit). LoRA: rank-16, all projections.
      Budget: ~$13 for 50 experts. Use remaining budget for eval.

      Domain selection for pilot: 10 programming languages, 10 science subfields,
      10 professional domains, 10 writing styles, 10 reasoning types.

      Research first: Use /notebooklm to survey large-scale LoRA distillation
      pipelines (e.g., Arcee-AI merge pipelines, OpenHermes data generation).
      Check references/arcee-trinity/ for multi-expert training approaches.

