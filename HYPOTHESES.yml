  # ── Reviewer Attack: "No comparison to alternatives" ───────────

  exp_composition_vs_monolithic:
    title: N×rank-r composed experts match 1×rank-Nr monolithic at same param budget
    status: supported
    scale: micro
    priority: 3
    depends_on: []
    blocks: []
    experiment_dir: micro/models/composition_vs_monolithic
    kill_criteria:
