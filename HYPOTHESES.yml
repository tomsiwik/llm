  # ── Inference Speed at Scale ─────────────────────────────────────

  exp_inference_latency_vs_N:
    title: End-to-end inference latency as function of composed expert count N
    status: proven
    scale: micro
    priority: 2
    depends_on: []
    blocks:
    - exp_inference_routing_strategies
    experiment_dir: micro/models/inference_latency_vs_N
    kill_criteria:
    - pre-merged model (additive composition) is >5% slower than base model at any N
    - dynamic top-k routing latency grows faster than O(k) with N
    - at N=50, any strategy exceeds 2x base model latency
    evidence:
    - date: '2026-03-07'
      claim: 'Batched LoRA k=1 is -4% overhead (faster than monolithic)'
      source: 'macro/batched_lora_latency/'
    - date: '2026-03-11'
      claim: 'Pre-merge overhead: max +2.6% across N=5..100 (K1 PASS)'
      source: 'micro/models/inference_latency_vs_N/'
    - date: '2026-03-11'
      claim: 'Dynamic k=1 overhead constant across N: 254-265% (Python impl-bound, not N-bound). k4/k1 ratio stable at 1.40-1.41 (K2 PASS)'
      source: 'micro/models/inference_latency_vs_N/'
    - date: '2026-03-11'
      claim: 'Hash ring routing: 0.5-0.6 us/query, O(log N), negligible at all N'
      source: 'micro/models/inference_latency_vs_N/'
    - date: '2026-03-11'
      claim: 'Memory: 0.28 MB/expert (micro), pre-merge is O(1), dynamic is O(N)'
      source: 'micro/models/inference_latency_vs_N/'
    tags:
    - inference
    - scaling
    - critical-path
    created: '2026-03-11'
    notes: >
      THE KEY PRODUCTION QUESTION. Two composition strategies have different
      inference profiles:

      (A) Pre-merged: W = W_base + sum(D_i)/N. Inference is identical to base
      model — zero overhead. But all experts are always active (no routing).

      (B) Dynamic top-k: at query time, select k experts, apply only their
      deltas. Inference = base forward + k LoRA forward passes.

      (C) Hybrid: pre-merge "always-on" foundation experts, dynamic-select
      specialists per query.

      Measure at N = 5, 10, 20, 50, 100:
      - Pre-merged throughput (tokens/sec) vs base
      - Dynamic k=1,2,4 latency vs base
      - Hybrid latency
      - Memory footprint per strategy

      Use existing adapters + synthetic ones to scale N.
      vLLM and S-LoRA are the serving baselines.

      Research first: Use /notebooklm to survey S-LoRA, Punica, dLoRA,
      and vLLM multi-adapter serving. What are the SOTA latency numbers
      for serving N concurrent LoRA adapters?

  exp_inference_routing_strategies:
    title: Optimal routing strategy for latency-quality tradeoff
    status: killed
    scale: micro
    priority: 3
    depends_on:
