    blocks: []
    experiment_dir: micro/models/base_free_composition
    kill_criteria:
    - base-as-adapter loses >20% quality vs native pretrained base
    - base adapter is not composable with domain adapters
    - base adapter parameter count exceeds 50% of original base model
    evidence:
    - "K1 SURVIVES: rank-16 base adapter loses only 1.9% base quality (threshold >20%)"
    - "K2 SURVIVES: rank-16 experts compose with loss ratio 1.014, cos ratio 1.22x"
    - "K3 SURVIVES: rank-16 base adapter ~42K params out of ~50K total (~84% at micro, but at d=3584 would be ~5%)"
    - date: '2026-03-11'
      claim: "Subsumed by exp_base_free_composition. SVD decomposition at rank-16 preserves base quality within 1.9% and expert composition within 1.4%."
      source: micro/models/base_free_composition/PAPER.md
    tags:
    - architecture
    - novel
    - cross-domain
    - critical-path
    created: '2026-03-11'
    notes: >
      PRACTICAL VARIANT: Instead of eliminating the base, convert it.

      Approach: take pretrained Qwen2.5-7B weights, subtract a minimal
      "skeleton" (random init or minimal pretrained checkpoint), express
      the difference as a set of adapters:
        W_pretrained = W_skeleton + A_foundation @ B_foundation

      If this works, the "base" becomes just another adapter that can be:
      - Swapped (upgrade Qwen2.5→Qwen3 by swapping the foundation adapter)
      - Composed (mix foundation adapters from different model families)
      - Evolved (clone-and-compete on the base itself)

      This would make the ENTIRE model — base included — part of the
      living composable architecture. No sacred frozen weights.

      Test: SVD decompose (W_pretrained - W_random) at various ranks.
      At what rank does the "base adapter" preserve base model quality?
      Is this rank small enough to be practical?

      Research first: Use /notebooklm to survey:
      - SVD compression of pretrained weights (ASVD, SliceGPT)
      - Model distillation into adapter format
      - "Lottery ticket" hypothesis — minimal subnetwork that preserves quality
      Key question: what rank captures the base model's knowledge?

