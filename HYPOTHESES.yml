      CV<0.03%; (2) synthetic experts confirm linear scaling variation~80*cos;
      (3) SVD and symmetric GS alternatives tested but unnecessary.

      Practical recommendation unchanged: do NOT use Gram-Schmidt for SOLE.
      Simple averaging is sufficient because deltas are already near-orthogonal.
      Order invariance is a non-issue.

