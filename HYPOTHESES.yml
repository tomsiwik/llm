  exp_expert_pruning_from_composition:
    title: Pruning low-quality experts from composition improves aggregate quality
    status: open
    scale: macro
    priority: 4
    depends_on:
    - exp_cat_weight_convergence
    - exp_pilot50_composition_quality
    blocks: []
    experiment_dir: macro/expert_pruning_composition
    kill_criteria:
    - Removing bottom-20% experts (by individual PPL) does not improve composed model PPL by >1%
    - Expert quality ranking is unstable across evaluation datasets (Kendall tau < 0.6)
    - Optimal subset selection requires >O(N log N) evaluations (not scalable to N=500)
    evidence:
    - 'CAT weights converge to ~1.0 — CAT optimization cannot identify weak experts'
    - 'Unit-weight composition is optimal for orthogonal experts, but some experts may not be orthogonal'
    - 'Collision landscape is block-diagonal: within-cluster interference 7.84x higher'
    - 'At N=50, collision rate 1.23% — but at N=500, within-cluster collisions may grow'
    tags:
    - composition
    - quality
    - scaling
    - evolve
    created: '2026-03-14'
    notes: >
      QUALITY CEILING INVESTIGATION. CAT weights converge to 1.0, confirming
      unit-weight composition is optimal in theory. But this assumes all experts
      are equally orthogonal and equally useful. In practice, some pilot50
      experts may: (a) have high within-cluster interference, (b) be trained on
      low-quality data, (c) be redundant with other experts. This experiment:
      (1) Rank all 50 experts by individual quality (domain PPL, MMLU accuracy)
      (2) Measure composed model quality as f(N) by adding experts in rank order
      (3) Test if removing bottom-K experts improves the composed model
      (4) Identify the quality-quantity tradeoff curve
      If pruning helps, SOLE's evolve phase should include quality-based culling.
      If it doesn't help (unit weight truly optimal), confirms SOLE's "more is
      always better" property — a strong scaling result.
      Depends on composition quality results to identify which experts are weak.
      real LoRA experts to test meaningfully.
