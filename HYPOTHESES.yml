    - safety
    - lifecycle
    created: '2026-03-11'
    notes: >
      Reviewer attack: "If you Gram-Schmidt orthogonalize sequentially,
      removing expert k requires recomputing the entire cascade."

      Test: merge 10 experts with Gram-Schmidt. Remove expert #5.
      (a) Naive: just subtract its contribution. Measure quality.
      (b) Recompute: re-orthogonalize remaining 9. Measure quality + time.
      (c) Compare to "never added" baseline (train 9 from scratch).

      If naive removal works (thanks to near-orthogonality), the cascade
