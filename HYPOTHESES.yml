    - no clear d threshold below which orthogonality breaks down (i.e. gradual not phase-transition)
    - gradient-aligned adapters are NOT more orthogonal than random subspaces (no separation effect)
    evidence:
    - 'Micro measurement: cos=0.0002 at d=896 (90x better than random bound)'
    - 'Random subspace geometry: E[cos] ≈ r/d for rank-r subspaces in R^d'
    - 'Grassmann packing bound: N_max ∝ d²/r²'
    - 'K1 PASS: all trained cos 17-69x below sqrt(r/d) bound at d=64..1024 (2 seeds, 4 pairs/d)'
    - 'K2 PASS: power law alpha=0.673 > 0.5, phase transition at d~128-256 for r=8'
    - 'K3 KILLED: trained cos is 2-9x HIGHER than random (gradient bias), but still 17-69x below bound'
    - 'Power law: E[|cos|] = 0.220 * d^(-0.673), R^2=0.637'
    - 'd_crit empirical ~128-256 for r=8, tau=0.01. Power law predicts d_crit=99.'
    - 'Revised understanding: orthogonality is geometric (concentration of measure), not gradient-driven'
    - 'Adversarial review PROCEED (2026-03-13): 5 non-blocking fixes noted (rename to validation, CI on power law, no-learning caveat, fix random seed, attention-layer gap)'
    - date: '2026-03-13'
      claim: "Characterization PROVEN (3 seeds, bootstrap). beta=-0.722 [CI -0.94, -0.51], decays faster than sqrt(r/d). Gradient cos 2.8-5.5x above random but still negligible (<0.006 at d=64). d=256 anomaly confirmed as noise (moved between runs, CV=0.63)."
      source: micro/models/structural_orthogonality_characterization/PAPER.md
    tags:
    - theory
    - orthogonality
    - foundation
    - sole-core
    created: '2026-03-12'
    notes: >
      SOLE's unique claim is STRUCTURAL orthogonality — no enforcement needed.
      This experiment formalizes that guarantee mathematically and empirically.

      Three deliverables:
      (1) Derive tight bound on E[cos(A_i, A_j)] for gradient-aligned LoRA
          adapters as f(d, r, domain_divergence). Start from random subspace
          geometry (Grassmannian), then show gradient alignment on different
          domains pushes subspaces APART (not just random).
      (2) Empirically validate at d=64, 128, 256, 512, 1024. Train adapter
          pairs on distinct domains at each d. Plot measured cos vs predicted
          bound. Show the separation effect (measured << random bound).
      (3) Identify critical d_crit where structural orthogonality becomes
          reliable (cos < τ=0.01). Predict: d_crit = r/τ = 1600 for r=16.
          Verify empirically.

      Math tools: Grassmannian manifold geometry, principal angle distributions,
      concentration inequalities (Johnson-Lindenstrauss style).
      Key reference: Absil et al. "Optimization Algorithms on Matrix Manifolds"
      for Grassmannian distance/angle theory.

      This is the theoretical foundation that elevates SOLE from empirical
      observation to provable guarantee.

