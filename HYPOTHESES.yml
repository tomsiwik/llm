    - Composition interference (pairwise cos) does not decrease >30% vs standard training
    - Training time increases >3x due to regularizer overhead
    evidence:
    - 'Minimax Grassmannian proved A-matrix packing is already optimal (AP equidistributed)'
    - 'Interference formula: ||delta_W_i^T delta_W_j||_F = (alpha/r)^2 * ||B_i^T (A_i^T A_j) B_j||_F'
    - 'B-matrix alignment is the sole uncontrolled variable in LoRA interference'
    - 'Frozen-A training locks A to skeleton (drift 0.02%); only B is learned'
    - date: '2026-03-14'
      claim: 'Experiment script written and submitted to GPU queue. Offline batched approach: fine-tune existing pilot50 adapters for 30 steps with B-repulsion loss (lambda=0.01). 10 domains, measures pairwise ||B_i^T B_j||_F before/after.'
      source: macro/b_matrix_regularization/run_b_repulsion.py
    - date: '2026-03-15'
      claim: >
        CRASHED: ValueError empty parameter list. After Phase 1 PeftModel
        wrapping/unwrapping, LoRA params not found in Phase 2. Fix already in
        code (explicit requires_grad + RuntimeError check at L171-181).
        Resubmission run_b_repulsion_1773567889 in queue will use fixed code.
      source: gpu_queue results run_b_repulsion_1773520515
    tags:
    - interference
    - training
    - novel
    - composition
    created: '2026-03-14'
    notes: >
      ROOT CAUSE FIX FOR INTERFERENCE. The minimax Grassmannian experiment
      proved that A-matrix geometry is already optimal (AP equidistributed),
      and the d=256 tail anomaly is entirely B-matrix training dynamics.
      The interference between experts i,j is:
        ||delta_W_i^T delta_W_j||_F = (alpha/r)^2 * ||B_i^T (A_i^T A_j) B_j||_F
      With frozen A (locked to AP skeleton), A_i^T A_j is fixed and near-zero.
      The remaining interference comes from B_i^T B_j alignment during training.
      Regularizer: add lambda * sum_{j!=i} ||B_i^T B_j||_F to training loss.
      Implementation: periodically sample other experts' B matrices from disk,
      compute repulsion gradient. Offline batched: train normally, then fine-tune
      with repulsion for 10% of steps. Expected to directly reduce the
      interference that matters most at scale (N=500+).

