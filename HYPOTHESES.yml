  # ── New Hypotheses: Composition Scaling Fixes (2026-03-15) ──────

  exp_composition_weight_normalization:
    title: Weight-normalized composition (1/sqrt(N)) prevents PPL explosion at high expert count
    status: open
    scale: macro
    priority: 3
    depends_on:
    - exp_distillation_pilot_50
    blocks:
    - exp_pilot50_composition_quality
    experiment_dir: macro/composition_weight_normalization
    kill_criteria:
    - K1: 1/sqrt(N) scaling does not reduce composed PPL by >50% vs unit-weight at N=50
    - K2: best scaling factor produces composed PPL >2x individual expert average PPL
    - K3: scaling factor that works at N=50 does not transfer to N=25 (not robust)
    evidence:
    - 'Motivation: unit-weight composition at N=50 produced PPL in trillions (catastrophic)'
    - 'CAT weights converge to 1.0 under perfect orthogonality, but real adapters are not perfectly orthogonal'
    - 'LoRA alpha/r scaling already normalizes individual adapters, but multi-adapter sum is unscaled'
    tags:
    - composition
    - scaling
    - normalization
    - macro-validation
    created: '2026-03-15'
    notes: >
      SIMPLEST FIX FOR PPL EXPLOSION. When composing N adapters via addition,
      the total LoRA contribution scales linearly with N. If adapters are not
      perfectly orthogonal, this creates constructive interference that grows
      with N, potentially explaining the trillions-PPL result.

      Test 4 scaling strategies at N=5,10,25,50:
      (1) Unit weight: w_i = 1.0 (current default)
      (2) Mean: w_i = 1/N (average rather than sum)
      (3) Sqrt: w_i = 1/sqrt(N) (geometric mean between sum and average)
      (4) Optimal: grid search w_i in [0.01, 0.05, 0.1, 0.2, 0.5, 1.0]

      Evaluate on per-domain PPL (same domains as composition_quality).
      Use retrained adapters (rank-16, all-modules).
      Inference only — cheap experiment (~10 min on A5000).

      If 1/sqrt(N) works: adopt as default, re-run all composition experiments.
      If 1/N works: composition is averaging, not additive (changes theory).
      If nothing works: PPL explosion is not a scaling issue (deeper problem).

  exp_cluster_grouped_composition:
    title: Cluster-aware composition with routing beats compose-all at macro scale
    status: open
    scale: macro
    priority: 3
    depends_on:
    - exp_distillation_pilot_50
    blocks: []
    experiment_dir: macro/cluster_grouped_composition
    kill_criteria:
    - K1: cluster-routed composition does not beat compose-all by >3% on held-out PPL
    - K2: cluster routing accuracy <80% (wrong cluster selected too often)
    - K3: cluster composition within-cluster PPL >10% worse than individual expert
    evidence:
    - 'Micro: within-cluster |cos| 7.84x higher than cross-cluster (block-diagonal interference)'
    - 'Micro: collision landscape top 10 pairs ALL within-cluster (30/30 across seeds)'
    - 'Micro: cross-cluster mean |cos|=0.008, near random baseline 0.002'
    - 'Micro: cluster-level routing achieves 95-96% accuracy'
    tags:
    - composition
    - routing
    - clustering
    - macro-validation
    created: '2026-03-15'
    notes: >
      LEVERAGES BLOCK-DIAGONAL INTERFERENCE. Micro experiments showed that
      composition interference is concentrated within domain clusters. Cross-cluster
      interference is near-random baseline. This suggests a two-level strategy:

      Architecture:
      (1) Cluster pilot-50 experts by domain similarity (5-10 clusters)
      (2) At query time: route to best cluster (96% accuracy at micro)
      (3) Compose only within-cluster experts (N=5-10 per cluster, not N=50)
      (4) Optionally: compose cluster representatives across clusters

      Compare 3 strategies:
      (a) Compose-all N=50 (baseline, currently catastrophic)
      (b) Route-to-cluster, compose within-cluster only
      (c) Route-to-cluster + cross-cluster representative merge

      Evaluate on MMLU subsets and per-domain PPL. Measure routing accuracy.
      Use cosine similarity of query embedding to cluster centroids for routing.

      If cluster routing works: SOLE serving becomes route-compose-serve,
      with N_effective = N/K_clusters instead of N. This is the natural production
      architecture.

  exp_greedy_expert_selection:
    title: Validation-guided greedy selection finds optimal expert subset from pilot-50
    status: open
    scale: macro
    priority: 3
    depends_on:
    - exp_distillation_pilot_50
    blocks: []
    experiment_dir: macro/greedy_expert_selection
    kill_criteria:
    - K1: greedy-selected subset of K experts does not beat compose-all-50 on held-out PPL
    - K2: greedy ordering differs from individual-quality ranking for <30% of experts (individual quality suffices)
    - K3: greedy selection requires >O(N^2) evaluations to converge (not scalable)
    evidence:
    - 'Composition quality degrades at high N (PPL in trillions at N=50)'
    - 'Some experts may be net-harmful to the composition (noise > signal)'
    - 'Individual expert quality may not predict composition contribution'
    - 'CAT weights converge to 1.0, cannot identify weak experts'
    tags:
    - composition
    - quality
    - selection
    - macro-validation
    created: '2026-03-15'
    notes: >
      DATA-DRIVEN OPTIMAL SUBSET. Instead of composing all 50 experts and hoping
      for the best, use a validation set to greedily build the optimal subset:

      Algorithm:
      (1) Evaluate base model on held-out set -> baseline PPL per domain
      (2) For each expert: evaluate base+expert -> individual improvement
      (3) Start with best individual expert
      (4) For each remaining: evaluate current_best + candidate -> pick best addition
      (5) Stop when adding any expert worsens quality (or all added)
      (6) Record the quality curve and optimal subset size K*

      O(N^2/2) evaluations = 1225 for N=50. At ~30s per eval: ~10 hours.
      Optimize: early stopping (skip experts whose individual score < threshold),
      cache per-domain PPL computations.

      Key questions answered:
      - What is the optimal number of composed experts? (K* may be << 50)
      - Which experts are net-harmful? (those never selected)
      - Does greedy order match individual quality order? (if yes, simpler heuristic suffices)
      - What quality ceiling does optimal selection achieve?

      If K* << 50: prune experts before composition (quality gate).
      If K* ~ 50: the composition method is the bottleneck, not expert selection.
