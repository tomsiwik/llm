    - 'macro: GPT-2-124M from scratch. cos_ratio=0.875x (ReLoRA MORE orthogonal), loss_ratio=1.122, base_ratio=1.121. All kill criteria disproven. K4 no divergence (16 cycles monotonic improvement). ReLoRA composition penalty ~0.1% (loss gap entirely from base quality). Date: 2026-03-14.'
    tags:
    - architecture
    - base-freedom
    - novel
    - critical-path
    created: '2026-03-11'
    notes: >
      THE BASE-FREE PATH. If a model can be built entirely from iterative
      low-rank updates (ReLoRA), then the base itself is just accumulated
      LoRA merges. This means:
      (1) No sacred pretrained weights — the base can be evolved
      (2) Base improvements = merge more LoRA updates (same mechanism as experts)
      (3) The entire model is a composition of rank-r updates

      Test at macro scale (Qwen2.5-0.5B equivalent):
      (a) Train ReLoRA base from scratch (K=50-200 merge cycles)
      (b) Train 5 domain experts on the ReLoRA base
      (c) Compare composition quality vs same experts on conventional base
      (d) Measure orthogonality preservation

      ReLoRA paper showed it works at 350M-1.3B scale for pretraining.
      We need to verify it works for the composition use case specifically.

      Research first: Use /notebooklm to survey ReLoRA implementations
      (original codebase, any HuggingFace reproductions), LTE parallel
