    - 'KC2 PASS (trivially): no quality gap exists -- N=8 (+0.56%) slightly better than N=2 (+0.70%)'
    - 'NULL RESULT: N/k gradient scaling hypothesis killed. Optimal LR is constant across N=2..16'
    - Scaling law exponent b=0.10, effectively zero. LR_opt = 0.76*(N/k)^0.10, r^2=0.067
    - 'Adam adaptive normalization cancels gradient attenuation: update ~ LR*m/sqrt(v) is invariant'
    - 'Practical scaling law: LR=3e-3, steps=100, independent of N. No adjustment needed.'
