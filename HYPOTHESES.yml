    - Synthetic stress test -- order dependence scales linearly with pairwise cosine (variation ~ 80*cos), 5% threshold crossed only at cos>0.06
    - At production scale (d=896, cos=0.0002), predicted order variation is 0.016%, 300x below threshold
    - SVD simultaneous orthogonalization tested as alternative -- retains only 40% signal vs 73% for GS, not recommended
    - Symmetric GS (average over orderings) works but costs 50x more compute for negligible benefit
    tags:
