    - practical
    created: '2026-03-07'
    notes: 'PROVEN 2026-03-07 (null result). The 5-7x gradient attenuation at N>2 does NOT require LR or step compensation.
      Adam adaptive second-moment normalization cancels gradient scaling automatically. Quality at cos=0.0 is independent
      of N (spread 0.42pp across N=2..16, within noise). The contribution protocol is trivially simple: same LR, same 100
      steps, any N. Higher LR is harmful (especially at low N). This closes the calibration branch of the hypothesis graph.'
  exp_adam_eps_extreme_n:
    title: Adam eps-term non-negligibility at N=1000+ experts
    status: open
