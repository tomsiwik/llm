      vLLM serving performance, aggregate quality vs base model, per-domain specialization retention.

      Storage: 500 * 6MB = 3GB. Well within NVMe. Orthogonality: 500 / 609K = 0.08% of capacity. Should be trivially safe.

      Research first: Use /notebooklm to survey large-scale LoRA merging (TIES-Merging, DARE, Model Soups at scale). Check
      references/ties-merging/ and references/dare-merging/ for interference patterns at high N.

