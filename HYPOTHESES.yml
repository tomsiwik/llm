      Layer 0 has 19.3% redundancy — dictionary would capture this plus deeper

      shared structure. Use /notebooklm to research mixture-of-subspaces, low-rank

      weight sharing, and hypernetwork approaches. Check Union-of-Experts paper

      (references/union-of-experts/) for shared sub-expert design.

