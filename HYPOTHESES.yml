    evidence:
    - 'KC1 KILL: 0.0pp combined advantage at all thresholds (3 seeds)'
    - SwiGLU has 0% dead capsules -- SiLU never produces exact zeros
    - Min fire frequency 0.998 across 512 capsules, 3 seeds
    - Gate-product pruning is the only viable criterion for SwiGLU
    - Dead capsule pruning is ReLU-specific, not architecture-general
    tags:
    - pruning
    - swiglu
    - composition
    - killed
    created: '2026-03-06'
    killed: '2026-03-07'
    notes: 'KILLED: Dead capsule pruning does not apply to SwiGLU architectures.

      SiLU activation has a soft floor (~4.5e-5) that prevents exact zeros.

      All 512 capsules fire on >99.8% of positions across 3 seeds.

      Combined pruning = gate-product pruning alone (0.0pp advantage).

      Key insight: pruning taxonomy is activation-function-dependent.

      ReLU -> frequency-based (dead capsule). SwiGLU -> magnitude-based (gate product).

      These are not combinable because only one applies per architecture.

      '
