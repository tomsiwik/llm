    - 'Phase transition persists but softens: 6.1x ratio at N=8 vs 19.0x at N=2'
    - Non-monotonic gradient profile at N=8 (peak at cos=0.3), unlike flat-then-collapse at N=2
    - 'Gradient-quality correlation remains strong: r^2=0.69 at N=8 (vs 0.93 at N=2)'
    - 3 seeds (42, 123, 7), 6 cosine levels, ~4.3 min total runtime
    - 'PROVEN 2026-03-07: Adversarial review PROCEED. Mechanism survives mixing-to-selection transition.'
