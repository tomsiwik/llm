    evidence:
    - 'AP optimizes mean coherence but d=256 tail anomaly shows outlier pairs (adversarial review)'
    - 'SOLE composition safety requires worst-case bounds, not just mean-case'
    - 'KILLED: AP converges to equidistributed configuration (max/mean=1.00x) that is already minimax-optimal'
    - 'KILLED: Stochastic refinement finds 0/500 improvements (0% acceptance rate at all d)'
    - 'FINDING: d=256 tail anomaly is training-dynamic (B-matrix alignment), not skeleton geometry'
    - 'FINDING: Skeleton has max/mean=1.00x; post-training delta vectors develop 9.4x tail via domain-dependent B overlap'
    tags:
    - grassmannian
    - initialization
    - orthogonality
    - sole-core
    created: '2026-03-13'
    killed: '2026-03-14'
    notes: >
      KILLED (K1). AP already converges to an equidistributed configuration where
      all pairwise coherences are identical (max = mean, ratio 1.00x). This is
      simultaneously the mean-case and minimax optimum. The d=256 tail anomaly
      (max/mean = 9.4x) occurs in POST-TRAINING delta vectors, not in the skeleton.
      The tail is caused by B-matrix alignment (similar domains learn similar B),
      not by skeleton geometry. No skeleton optimization can fix this. To control
      worst-case composition interference, must address B-matrix overlap during
      training (regularization, norm constraints), not initialization geometry.
      Two approaches tested: (1) modified AP structural projection with adaptive
      threshold -- disrupts AP convergence, worse at 2/3 dimensions; (2) post-AP
      stochastic refinement on Grassmannian -- 0% acceptance, AP fixed point is
      locally minimax-optimal. K2 passed (1.01-1.06x compute).

