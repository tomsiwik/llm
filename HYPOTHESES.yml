    evidence:
    - 'Merge order variation scales as ~80*cos (proven in merge_order_dependence)'
    - 'Attention-layer cos=0.85 for related domains vs FFN cos=0.59 (ffn_only_vs_all_modules)'
    - 'Predicted attention-layer variation at cos=0.85: ~68% -- well above 5% threshold'
    - 'Flattened-vector analysis may mask layer-specific effects (reviewer advisory)'
    - date: '2026-03-15'
      claim: >
        KILLED (K2): Attn/FFN slope ratio=1.01x (threshold: not within 5% of 1.0 = identical).
        Scaling law variation ~ 62*cos holds identically for both layer types (attn slope=61.9,
        FFN slope=61.6, R2>0.88). Absolute variation differs (attn 48.5% vs FFN 46.6%) because
        input cosines differ (0.85 vs 0.59), not because of different sensitivity mechanisms.
        K1 PASSES: attn variation 49% >> 1% threshold. Flattened vs layer-wise GS diverge
        meaningfully (cos=0.975, L2=22.4%) but show similar order sensitivity. 3 seeds.
      source: micro/models/layerwise_order_sensitivity/results.json
    tags:
    - composition
    - orthogonality
    - attention
    created: '2026-03-14'
    notes: >
      KILLED 2026-03-15. Order sensitivity is cosine-determined, not layer-type-determined.
      Both attn and FFN follow variation ~ 62*cos with identical slopes. The higher absolute
      variation of attention layers at production settings is entirely explained by higher
      input cosines (0.85 vs 0.59). Layer-wise composition strategies (GS for attn, sum for
      FFN) are NOT motivated by order sensitivity. The per-sublayer slope (~62) is lower than
      the parent flattened slope (~80) due to independent shared directions per sublayer.
      Bonus finding: flattened vs layer-wise GS produce 22% different merged vectors, but
      this is moot since GS is not used in SOLE (simple averaging preferred).

