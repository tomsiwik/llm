    evidence:
    - 'K1 CONDITIONAL PASS: Near-orthogonal regime (cos~0.001, SOLE production): naive subtraction recon error 0.18% max, per-expert regression 0.0022% max. Clustered cos=0.3: recon error 10.1% but per-expert regression 3.6% at N=10 only. At N>=20, regression < 2.8%. Date: 2026-03-15.'
    - 'K2 PASS: GS recompute 1.06s at N=50, 14.8s at N=200. Kill threshold (10 min) not reached until ~N=1600. Date: 2026-03-15.'
    - 'KEY FINDING: Two regimes. cos<0.01 -> naive O(1) subtraction sufficient (<0.2% error, 2000x speedup). cos>0.1 -> GS recompute required but cheap (<2s at N=50). SOLE operates in the naive-sufficient regime. Date: 2026-03-15.'
    - 'Position sensitivity: removing first expert in GS order = worst case (24.3% error). Last expert = zero error. Production clone-compete removes recent clones (late position, low error). Date: 2026-03-15.'
    - date: '2026-03-15'
      claim: >
        Adversarial review: PROCEED. Status downgraded to supported (PPL never measured,
        only reconstruction error proxy). Three non-blocking fixes: (1) Lipschitz claim
        overstated in MATH.md, (2) attention-layer cosine risk (cos=0.85) not acknowledged,
        (3) code K1 aggregate check incorrect (prints KILL due to stress tests).
      source: micro/models/expert_removal_graceful/REVIEW-adversarial.md
    tags:
