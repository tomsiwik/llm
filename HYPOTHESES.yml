  exp_delta_rank_scaling:
    title: Does delta effective rank ratio (r_needed/d) decrease at larger d?
    status: revise
    scale: micro
    priority: 3
    depends_on:
    - exp_base_free_composition
    blocks: []
    experiment_dir: micro/models/delta_rank_scaling
    kill_criteria:
    - r_needed/d ratio stays above 0.5 at d=128 and d=256 (rank requirement is too high for macro)
    - larger models show higher effective rank ratio than smaller ones
    evidence:
    - 'K1 KILLED: Shannon r_eff/d ratio 0.629 at d=128 and 0.538 at d=256 (both > 0.5)'
    - 'K2 SURVIVES: ratio monotonically decreases (0.664 -> 0.629 -> 0.538, Cohens d=42)'
    - 'Power law: rho(d) = 1.269 * d^(-0.152), R^2=0.929'
    - 'Practical rank (r_95) scales more favorably: ratio 0.455 -> 0.415 -> 0.320'
    - 'Attention weights scale best: ratio 0.592 -> 0.431 (27% reduction)'
    - 'Extrapolation to d=4096: Shannon rank ~1472, practical rank ~500'
    - '3 seeds, std < 0.003, unanimous trend'
    - 'REVISE (adversarial review 2026-03-11): 5 fixes required'
    - 'Fix 1: convergence control (train all sizes to same val loss, not same steps)'
    - 'Fix 2: exclude embeddings from aggregate ratio (V=27 contaminates d-scaling signal)'
    - 'Fix 3: report CI on power law exponent (3-point fit is underdetermined)'
    - 'Fix 4: accept K1 kill cleanly, register new hypothesis with r_95 metric'
    - 'Fix 5: add multi-checkpoint rho measurement to verify convergence'
    tags:
    - architecture
    - base-freedom
    - scaling
    created: '2026-03-11'
    completed: '2026-03-11'
    notes: >
      WEAK_KILL: K1 technically killed (Shannon r_eff ratio > 0.5 at both
      d=128 and d=256), but K2 SURVIVES (monotonically decreasing trend).
      The practical rank metric (r_95, 95% energy capture) falls below 0.5
      at d=256 (0.320) and extrapolates to ~0.12 at d=4096 (rank ~500).
      Base-as-adapter is feasible but requires higher rank than LoRA experts:
      rank-500 at d=4096 = 5% of model, amortized over N experts.
      Attention weights scale much better than FFN weights.
      Literature (arXiv:2510.00537) confirms: hard rank utilization reliably
      declines with width, power law exponent -0.4 to -0.6 for hard rank.
      Our exponent -0.15 is consistent with entropy-based (soft) rank.
      Next: validate at d=896 (Qwen 0.5B macro) to add a 4th data point.
      ADVERSARIAL REVIEW (2026-03-11): REVISE. Core concern: under-training
      confound (steps scale linearly but capacity quadratically). The entire
      observed trend could be an artifact. Fix #1 (convergence control) is
      cheapest and most impactful. Also: 3-point power law is underdetermined,
      K1 kill should be accepted (not reinterpreted via r_95 post-hoc).

