    evidence:
    - date: '2026-03-13'
      claim: "PARTIAL KILL at micro (d=32). K1a PASS: full-rank routed +5.5% vs mono (threshold >10%). K1b KILLED: truncated r=4 +71% (rank starvation at d=32). K2 PASS: composition 0.94x cost. Sequential mono catastrophic (+39% worse than no training). Macro MoE already shows composition wins -0.70%."
      source: micro/models/composition_vs_monolithic/PAPER.md
    tags:
    - composition
    - baselines
    - critical-path
    created: '2026-03-11'
    notes: >
      The claim is N×rank-r >= 1×rank-Nr (at same total params).
      Composition does NOT need to outperform monolithic — it needs to MATCH.
      If quality is within ~5%, SOLE wins on operational advantages:
      - Fix one domain: retrain 1 expert (30 sec, $0.25) vs retrain everything
      - Add new domain: train 1 new expert vs retrain everything
      - Remove domain: delete adapter file vs retrain everything
      - Parallel training: N independent jobs vs 1 sequential multi-task job
      - No catastrophic forgetting: experts are independent

      Train: (a) 5 separate rank-8 experts, merge via addition
      (b) 1 monolithic rank-40 LoRA on combined data from all 5 domains
      (same total parameter budget: 5×rank-8 ≈ rank-40)

      Measure per-domain quality, cross-domain quality, and forgetting.
      The monolithic must resolve competing gradients in one shared subspace.
      Composed experts each solve an easier problem (single-task in own subspace).
      The only way monolithic wins is if cross-task transfer within the adapter
      is valuable — which contradicts orthogonality (tasks don't share subspaces).

      Research first: Use /notebooklm to survey multi-task fine-tuning vs
      modular approaches (T-Few, Flan-T5, adapter composition literature).
      Check references/union-of-experts/ for union-based expert composition.

