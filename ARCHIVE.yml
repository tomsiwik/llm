    notes: 'Original hypothesis partially confirmed, partially refined. The gap between composed and joint is NOT the gradient
      signal (negative correlation). The actual mechanism is expert discriminability: when expert outputs differ per token,
      the router gets strong gradients. Orthogonal experts maximize discriminability. This refines the gap-as-signal framing
      in VISION.md: the conclusion (orthogonal is better) is correct, but the mechanism (gap drives gradients) is wrong —
      discriminability drives gradients, and the gap is a downstream symptom.'
