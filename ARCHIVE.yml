  exp_grassmannian_expert_init:
    title: Alternating Projection constructs optimal expert subspace skeleton on Gr(r, d)
    status: proven
    scale: micro
    priority: 2
    depends_on:
    - exp_structural_orthogonality_proof
    blocks:
    - exp_scale_500_experts
    experiment_dir: micro/models/grassmannian_expert_init
    kill_criteria:
    - AP-initialized experts show higher interference (cos) than random-ORTHONORMAL after training
    - AP initialization adds >10 minutes setup time for N=500 at production d
    - '(K3 reclassified: zero drift with frozen A is a design property / tautology, not a kill criterion)'
    evidence:
    - 'Grassmannian packing via alternating projection: Tropp et al., Dhillon et al.'
    - 'REVISED (2026-03-13): 3-condition comparison (AP-ortho vs random-ortho vs random-Gaussian)'
    - 'AP beats random-orthonormal at ALL d: 1.23x (d=64), 1.52x (d=128), 1.33x (d=256)'
    - 'Wilcoxon signed-rank: significant at d=128 (p=0.009) and d=256 (p=0.012), not at d=64 (p=0.096)'
    - 'Orthonormality effect alone is small/inconsistent (0.99-1.32x, never clearly significant)'
    - 'K3 reclassified: frozen-A LoRA = zero drift by mathematical tautology, not empirical finding'
    - 'd=256 tail anomaly: AP max |cos| exceeds random for one seed (optimizes mean, not worst-case)'
    - 'AP time: 6-112s at micro; estimated 5-10 min at production scale'
    - 'K1 PASS (direction correct at all d, significant at 2/3), K2 PASS'
    - 'Adversarial review #2 PROCEED (2026-03-13): all 5 fixes validated, paired-sample dependence non-blocking'
    - 'PROVEN (2026-03-13): AP packing genuine benefit beyond orthonormality at d>=128'
    tags:
    - grassmannian
    - initialization
    - orthogonality
    - sole-core
    created: '2026-03-13'
    notes: >
      Construct a "skeleton" of N optimal subspace slots on the Grassmannian
      Gr(r, d) using Alternating Projection (Tropp/Dhillon). Each slot is
      maximally distant from all others — guaranteed zero interference.

      Algorithm: ping-pong between structural constraint (cap off-diagonal
      block norms at target μ) and spectral constraint (project to rank-d
      PSD with correct trace). Per iteration: one eigendecomposition of
      the (rN × rN) Gram matrix, O((rN)³). Typically 5000 iterations.

      Expert training: initialize LoRA A_i into assigned slot. Fine-tune
      on domain data. Hypothesis: gradient stays near assigned subspace
      because domain-specific gradients have no reason to invade other slots.

      Implementation: ~35 lines PyTorch. torch.linalg.eigh, tensor reshape
      for block-norm clipping, bisection for trace constraint. Fully GPU.

      This turns structural orthogonality from "happy accident in high-d"
      to "by design." The skeleton IS the expert registry — adding an expert
      means claiming next available slot, removing means freeing one.
      Grassmannian packing bound gives exact capacity: N_max for given r, d, μ.

      Key references:
      - Dhillon et al. "Constructing Packings in Grassmannian Manifolds"
      - GrMoE (arxiv 2602.17798) — Bingham-distributed routing on Gr(r,d)
      - LoRI (arxiv 2504.07448) — forced orthogonal LoRA init (simpler version)

