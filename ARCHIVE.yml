  exp_frechet_merge_vs_arithmetic:
    title: Riemannian Fréchet mean merges experts better than Euclidean averaging
    status: supported
    scale: micro
    priority: 3
    depends_on: []
    blocks: []
    experiment_dir: micro/models/frechet_merge
    kill_criteria:
    - Fréchet merge quality within 1% of naive addition (no benefit)
    - Fréchet merge adds >5% latency vs naive addition at serving time
    - chordal approximation diverges significantly from geodesic exact mean
    evidence:
    - 'Task Arithmetic uses Euclidean averaging — ignores manifold curvature'
    - 'Chordal Fréchet mean is closed-form: top-r SVD of avg projection matrices'
    - 'SOLE currently uses W + Σ ΔW_i (Euclidean addition)'
    - date: '2026-03-13'
      claim: "SUPPORTED with major caveats. Chordal Frechet wins on subspace preservation (by construction) but naive addition dramatically outperforms on downstream NTP (-69% MSE penalty for chordal). Chordal discards B-weighted information. Recommendation REVERSED: do NOT replace naive addition. Grassmannian framework valuable for analysis/capacity, not merging."
      source: micro/models/frechet_merge/PAPER.md
    tags:
    - grassmannian
    - composition
    - merging
    - sole-core
    created: '2026-03-13'
    notes: >
      Current SOLE composition is naive addition: W_composed = W_base + Σ ΔW_i.
      This is Euclidean averaging that ignores the curved geometry of the
      subspace manifold. Riemannian Fréchet mean computes the proper average
      on Gr(r, d).

      Two variants to test:
      (1) Chordal approximation (closed-form, ~5 lines):
          P_avg = (1/N) Σ A_i A_i^T
          U, S, _ = svd(P_avg)
          merged = U[:, :r]  → one SVD, done.
      (2) Geodesic exact (Karcher flow, 5-20 iterations):
          Log map: project each expert to tangent space at current mean
          Average in tangent space
          Exp map: project back to manifold
          Per-step: SVD + arctan/cos/sin of singular values

      Hypothesis: at small N (k=2-5 active experts), naive addition ≈ Fréchet
      because subspaces barely overlap. At large N or similar domains, Fréchet
      should outperform by avoiding cross-term artifacts.

      The chordal approximation should match geodesic within 1% — if so,
      it's strictly better than current approach at negligible cost (one SVD).

      Key references:
      - Absil et al. "Optimization Algorithms on Matrix Manifolds"
      - Steele 2026 "Subspace Geometry Governs Catastrophic Forgetting"
      - Karcher mean on Grassmannians (Karcher 1977, Afsari 2011)

