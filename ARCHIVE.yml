    notes: >
      PRACTICAL VARIANT: Instead of eliminating the base, convert it.

      Approach: take pretrained Qwen2.5-7B weights, subtract a minimal
      "skeleton" (random init or minimal pretrained checkpoint), express
      the difference as a set of adapters:
        W_pretrained = W_skeleton + A_foundation @ B_foundation

      If this works, the "base" becomes just another adapter that can be:
      - Swapped (upgrade Qwen2.5→Qwen3 by swapping the foundation adapter)
      - Composed (mix foundation adapters from different model families)
      - Evolved (clone-and-compete on the base itself)

      This would make the ENTIRE model — base included — part of the
      living composable architecture. No sacred frozen weights.

      Test: SVD decompose (W_pretrained - W_random) at various ranks.
      At what rank does the "base adapter" preserve base model quality?
      Is this rank small enough to be practical?

