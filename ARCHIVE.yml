    - date: '2026-03-15'
      claim: 'BLOCKED: dependency exp_answer_conditioned_shadow_scoring was KILLED. Answer-only PPL does not transfer from
        micro to macro scale (r=-0.63 vs r=0.81). This hypothesis cannot proceed without an alternative quality signal. Consider:
        task-specific accuracy eval, or investigate why micro-to-macro transfer failed.

        '
    tags:
    - evolve
    - scoring
    - automation
    - novel
    created: '2026-03-15'
    notes: 'TEACHER-FREE EVOLUTION. If answer-only PPL predicts accuracy (proven micro, testing macro), we can use it as a
      cheap automated quality signal:

      Loop: (1) Evaluate expert on held-out domain questions using answer-only PPL (2) Identify worst-performing question
      types (highest PPL_answer) (3) Generate more training data for weak areas (from existing teacher data) (4) Retrain expert
      with augmented data (5) Re-evaluate with answer-only PPL (6) Accept if PPL_answer improves, reject otherwise

      This is cheaper than teacher-based correction ($0 for PPL eval vs $0.001/query for teacher judge). If it works, SOLE
      can self-improve with zero API cost.

      Test on 5 pilot50 experts. 3 refinement iterations each. Compare PPL-guided improvement vs random data augmentation
      (control).

      '
