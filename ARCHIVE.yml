      (96% accuracy at micro) (3) Compose only within-cluster experts (N=5-10 per cluster, not N=50) (4) Optionally: compose
      cluster representatives across clusters

      Compare 3 strategies: (a) Compose-all N=50 (baseline, currently catastrophic) (b) Route-to-cluster, compose within-cluster
      only (c) Route-to-cluster + cross-cluster representative merge

      Evaluate on MMLU subsets and per-domain PPL. Measure routing accuracy. Use cosine similarity of query embedding to cluster
      centroids for routing.

      If cluster routing works: SOLE serving becomes route-compose-serve, with N_effective = N/K_clusters instead of N. This
      is the natural production architecture.

      '
