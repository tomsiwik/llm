      router gradients'
    - 'Phase transition at cos~0.5-0.7: gradients flat at ~0.17 for cos<=0.5, collapse to 0.01 at cos=0.9'
    - 'Corrected causal chain: cos -> discriminability -> gradient -> quality (r²=0.63, 0.75 on mean curve)'
