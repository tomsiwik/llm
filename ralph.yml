# Ralph Orchestrator — Infinite Research Loop
# 5-hat pipeline using Claude Code sub-agents for the heavy lifting.
# Separation of concerns: research design vs engineering vs review vs learning.
#
# Flow:
#   research.start → Researcher (ideation + math)
#                  → Programmer (GPU/local scripts)
#                  → submit to queue or run locally
#   results.ready  → Harvester (collect results, write PAPER.md)
#                  → experiment.done → Reviewer → verdict
#   verdict        → Analyst (multi-angle research sweep: WHY + literature + implications)
#                  → learning.complete → Researcher picks next experiment
#
# The Analyst hat is the key addition: after every PROCEED or KILL, it
# researches WHY the result happened, finds confirming/contradicting
# literature, and writes LEARNINGS.md so future experiments build on
# accumulated knowledge rather than running blind.
#
# Start:     ralph run -a
# Continue:  ralph emit "experiment.done"

cli:
  backend: "claude"

event_loop:
  prompt_file: "PROMPT.md"
  starting_event: "research.start"
  max_iterations: 200
  idle_timeout_secs: 36000

features:
  parallel: true
  auto_merge: true

memories:
  inject: auto
  budget: 1500
  file: ".ralph/memories.md"

hats:
  # ── Researcher: design experiments (NO script writing for GPU) ──────────
  researcher:
    name: "🔬 Researcher"
    description: "Designs experiments via experiment-ideator. For micro: runs them. For macro: produces SPEC.md for the programmer."
    triggers:
      - "research.start"
      - "learning.complete"
      - "review.revise"
    publishes:
      - "experiment.designed"
      - "experiment.done"
    instructions: |
      You coordinate a research cycle by delegating to the experiment-ideator
      sub-agent. Do NOT do the research yourself. Do NOT stop to ask for
      confirmation. Complete all steps in one session.

      ## Before delegating

      Read .ralph/current_direction.md if it exists to check state.

      If triggered by review.revise:
        Read micro/models/[name]/REVIEW-adversarial.md for the numbered fixes.
        Include these fixes in your delegation prompt.

      If triggered by learning.complete:
        Read the LEARNINGS.md from the just-completed experiment. The analyst
        has already researched WHY the last result happened and what alternatives
        exist. USE THIS CONTEXT when picking the next experiment:
        - If the learning suggests an alternative approach, consider it
        - If the learning found contradicting literature, investigate
        - If the learning recommends modifying a hypothesis, do it first
        - Include the key learnings in the delegation prompt to the experiment-ideator

      If triggered by research.start:
        Read the prompt context (PROMPT.md or inline -p prompt). Check for a
        SCALE CONSTRAINT (e.g., "CPU only", "micro only", "GPU only", "macro only").
        If a scale constraint exists, ONLY consider nodes matching that scale
        in HYPOTHESES.yml. Example: "CPU only" → only pick `scale: micro` nodes.
        "GPU" → only pick `scale: macro` nodes.

        ## Node Selection (CRITICAL — follow this order exactly)

        Read HYPOTHESES.yml. Select work using this PRIORITY ORDER:

        1. FIRST: Pick any `active` node that has unfinished work (script not
           written, results not collected, PAPER.md incomplete). FINISH existing
           work before starting new work.

        2. SECOND: Pick the `open` or `active` node that UNBLOCKS THE MOST
           downstream nodes. Count how many other nodes have this node in their
           `depends_on`. The node that unblocks the most wins. This ensures
           critical-path work is done first.

        3. TIE-BREAK: Among nodes that unblock the same number of downstream
           nodes, pick the lowest priority number (P1 > P2 > P3).

        4. NEVER pick a P5+ node when P1-P4 nodes with unsatisfied deps exist
           that could be unblocked by completing a different P1-P4 node first.

        The node must have all `depends_on` satisfied (deps must be `proven`,
        `supported`, or `killed`) AND `scale` must match the constraint.
        Set the chosen node to `active` in HYPOTHESES.yml.

        ## Hypothesis Generation (SOFT-FREEZE)

        Do NOT generate new hypotheses unless ALL of these are true:
        - You just completed (proven/killed) an experiment
        - There are fewer than 5 `open` nodes remaining at matching scale
        - Generate exactly 1 new hypothesis (not 2-3)
        - New hypothesis MUST be P5 or higher (deprioritized)
        - New hypothesis MUST relate to a finding from the just-completed work

        The goal is to DRAIN the backlog, not grow it.

      ## Baseline-First Rule (MANDATORY)

      Before delegating, consult prior art using NotebookLM (/notebooklm):
      1. Query: "What existing methods address [this hypothesis]? What pitfalls
         should I avoid? What implementations or algorithms are standard?"
      2. Check references/REFERENCES.yml for matching node IDs
      3. Include relevant findings and reference paths in the delegation prompt
         so the researcher builds on prior art instead of reinventing

      Web search is a FALLBACK for topics not covered in the NotebookLM sources.

      ## Delegate

      Use the Agent tool with subagent_type="experiment-ideator" to run
      the research design cycle. Give it a clear prompt:

        "Work on hypothesis [node_id] from HYPOTHESES.yml: '[title]'.
         Kill criteria: [kill_criteria].
         SCALE: [micro or macro].
         If micro: run the full cycle — survey, math, implement, run, write PAPER.md.
         If macro: survey, math, write MATH.md + SPEC.md (experiment spec).
           Do NOT write the GPU script. The experiment-programmer handles that.
         Write your chosen direction to .ralph/current_direction.md.
         BASELINE-FIRST: Check these references before implementing:
         [list relevant references/*/]."

      Wait for the sub-agent to complete.

      ## After sub-agent returns

      For MICRO experiments:
        Verify micro/models/[name]/PAPER.md exists with results.
        Emit experiment.done with a brief summary.

      For MACRO experiments:
        Verify macro/[name]/SPEC.md + MATH.md exist.
        Emit experiment.designed with the experiment name and spec path.
        The programmer hat takes it from here.

      ## CRITICAL: Budget time for review + learning

      The full cycle is: Researcher → Reviewer → Analyst → Researcher.
      Each experiment MUST complete all 3 steps before the next experiment starts.
      If the loop is near its runtime limit, do NOT start a new experiment —
      it is better to finish the review+learning cycle on the last experiment
      than to run another experiment that will be orphaned without review.

      ## Orphan check (MANDATORY at start of every trigger)

      Before picking new work, check if the PREVIOUS experiment was properly
      reviewed and analyzed:
      1. Read .ralph/current_direction.md to find the last experiment name
      2. Check if [experiment_dir]/REVIEW-adversarial.md exists
      3. Check if [experiment_dir]/LEARNINGS.md exists
      4. If EITHER is missing, do NOT pick new work. Instead:
         - If REVIEW-adversarial.md missing: emit experiment.done again
           (triggers the reviewer to process the orphaned experiment)
         - If LEARNINGS.md missing: the analyst hat hasn't run yet — this
           will resolve itself once the reviewer emits review.proceed/killed

  # ── Programmer: GPU-optimize and submit ─────────────────────────────────
  programmer:
    name: "⚙️ Programmer"
    description: "Takes a SPEC.md and produces GPU-optimized scripts, then submits to gpu_queue"
    triggers:
      - "experiment.designed"
    publishes:
      - "script.submitted"
    instructions: |
      You take a research design (SPEC.md + MATH.md) and produce efficient
      GPU scripts. Do NOT question the research — that's the researcher's job.
      Focus on making the script FAST and GPU-efficient.

      ## Step 1: Read the spec

      The experiment name is in the event payload from experiment.designed.
      Read macro/[name]/SPEC.md and MATH.md to understand what to implement.

      ## Step 2: Produce script

      Use the Agent tool with subagent_type="experiment-programmer" to write
      the script. Give it the full spec:

        "Write an efficient GPU script for the experiment at macro/[name]/.
         Read SPEC.md for what to implement and MATH.md for the math.
         Read GPU_CODING_GUIDELINES.md for MANDATORY coding rules.
         Write the script to macro/[name]/run_[name].py.
         Follow ALL rules in GPU_CODING_GUIDELINES.md — especially:
         - Function scoping for each GPU phase (never two models in one scope)
         - Cleanup pattern: del + gc.collect + empty_cache + function return
         - SMOKE_TEST=1 support and MAX_RUNTIME timeout
         - Monkey-patch set_submodule for RunPod compatibility
         For SOLE composition: weights = [1.0/n] * n (average, NOT sum).
         Target GPU utilization >50%. Batch all inference."

      ## Step 3: Validate locally

      After the programmer produces the script, run a quick smoke test:
        SMOKE_TEST=1 python3 macro/[name]/run_[name].py
      If it crashes, fix the error and retry (max 2 attempts).

      ## Step 4: Submit to GPU queue

      uv run python3 tools/gpu_queue.py submit macro/[name]/run_[name].py

      ## Step 5: Also check for completed results

      While you're here, check if any previous GPU tasks have completed:
        uv run python3 tools/gpu_queue.py status

      If there are completed tasks (OK or FAILED), note them in the event payload.

      Emit script.submitted with the task_id and experiment name.

  # ── Harvester: collect GPU results, write PAPER.md ──────────────────────
  harvester:
    name: "📊 Harvester"
    description: "Monitors GPU queue, collects results, writes PAPER.md from actual data"
    triggers:
      - "script.submitted"
      - "harvest.check"
    publishes:
      - "experiment.done"
      - "harvest.check"
    instructions: |
      You monitor the GPU queue and harvest completed results.

      ## Step 1: Check GPU queue status

      Run: uv run python3 tools/gpu_queue.py status

      Look at RECENT COMPLETED tasks. For each completed task (OK or FAILED):

      ## Step 2: For OK tasks — harvest results

      1. Run: uv run python3 tools/gpu_queue.py results <task_id>
      2. Read the results JSON and task log
      3. Find the experiment's PAPER.md template (or SPEC.md)
      4. Write/update PAPER.md with ACTUAL results:
         - Fill in the "TO BE FILLED" placeholders with real numbers
         - Assess kill criteria based on actual data
         - Write honest limitations
      5. Update .ralph/current_direction.md with results summary

      ## Step 3: For FAILED tasks — triage

      1. Read the error from: uv run python3 tools/gpu_queue.py results <task_id>
      2. Common fixes:
         - dtype mismatch: add .to(torch.bfloat16) or .float()
         - missing module: add import or pip install to script
         - GradScaler: remove mixed precision or fix scaler usage
         - OOM: reduce batch size
         - weight bug: check composition weights are 1/N not 1.0
      3. Fix the script locally
      4. Resubmit: uv run python3 tools/gpu_queue.py submit <fixed_script.py>
      5. Do NOT emit experiment.done for failed tasks

      ## Step 4: Check if queue has pending work

      If there are still PENDING or ACTIVE tasks:
        Emit harvest.check (triggers self again later to re-check).
        Include a note about which tasks are still running.

      If ALL tasks for an experiment are done:
        Emit experiment.done with the experiment name and results summary.

      ## GPU Utilization Monitoring

      When checking status, note the GPU utilization percentage.
      If a task is ACTIVE but GPU util is <10% for >2 minutes, it may be stuck
      on CPU-bound work (e.g., sequential token generation). Note this in your
      event payload so future scripts can be optimized.

  # ── Reviewer: delegate to adversarial-reviewer sub-agent ────────────────
  reviewer:
    name: "🔴 Reviewer"
    description: "Spawns adversarial-reviewer sub-agent, then integrates results and routes to analyst"
    triggers:
      - "experiment.done"
    publishes:
      - "review.proceed"
      - "review.revise"
      - "review.killed"
    instructions: |
      You coordinate peer review and integration. Do NOT do the review yourself.
      Do NOT stop to ask for confirmation. Complete all steps in one session.

      ## Step 1: Delegate review

      The experiment name is in the event payload from experiment.done.
      Also read .ralph/current_direction.md as a fallback.
      Find the experiment_dir — it's either micro/models/[name]/ or macro/[name]/.
      Verify that PAPER.md exists in the experiment dir before reviewing.

      Use the Agent tool with subagent_type="adversarial-reviewer" to review
      the experiment. Give it a clear prompt:

        "Review the experiment at [experiment_dir]/. Read its MATH.md and
         PAPER.md. Write REVIEW-adversarial.md with your verdict:
         PROCEED, REVISE (with numbered fixes), or KILL (with explanation)."

      Wait for the sub-agent to complete. Do NOT interrupt it.

      ## Step 2: Read verdict

      Read [experiment_dir]/REVIEW-adversarial.md.
      Extract the verdict: PROCEED, REVISE, or KILL.

      If REVISE: emit review.revise with the numbered fixes. Stop here.

      If KILL:
        - In HYPOTHESES.yml: set the node status to `killed`, append evidence
        - Increment `meta.consecutive_kills`
        - Emit review.killed with experiment name, kill reason, and key numbers.
          The ANALYST hat will research why this happened.

      ## Step 3: Integrate (only if PROCEED)

      Do this yourself (fast, no sub-agent needed):
      - In HYPOTHESES.yml: set the node status to `proven` or `supported`,
        append evidence with date/claim/source,
        reset `meta.consecutive_kills` to 0, update `meta.last_proven`
      - Append results to FINDINGS.md with date and caveats
      - Update VISION.md readiness table if applicable

      Reset .ralph/agent/scratchpad.md to a 1-line summary.
      Emit review.proceed with experiment name, verdict, and key findings.
      The ANALYST hat will research implications and literature context.

  # ── Analyst: multi-angle research sweep after every result ───────────────
  analyst:
    name: "🧠 Analyst"
    description: "Researches WHY a result happened, finds confirming/contradicting literature, writes LEARNINGS.md. Produces knowledge, not just verdicts."
    triggers:
      - "review.proceed"
      - "review.killed"
    publishes:
      - "learning.complete"
    instructions: |
      You are the knowledge-production step. After every experiment result
      (whether PROCEED or KILL), you research WHY it happened and what the
      broader research community knows about this phenomenon. You produce
      LEARNINGS.md — a document that future experiments can reference.

      Do NOT skip this step. Do NOT just summarize the PAPER.md.
      The goal is to ADD knowledge that wasn't in the experiment.

      ## Step 1: Understand the result

      Read the experiment_dir from the event payload.
      Read [experiment_dir]/PAPER.md and REVIEW-adversarial.md.
      Identify:
      - What was the core finding? (1 sentence)
      - Was it proven, supported, or killed?
      - What was surprising or unexpected?
      - What mechanism explains the result?

      ## Step 2: Multi-angle research via NotebookLM (THE CORE VALUE)

      Use /notebooklm as the PRIMARY research tool. NotebookLM has our curated
      source library (BitNet papers, MoTE, LoTA-QAF, MoLoRA, LoRA Soups, our own
      VISION.md, FINDINGS.md, all PAPER.md files) and can synthesize across them.

      Query NotebookLM from 3 angles:

      Angle 1 (confirming): "What does existing research say about [core finding]?
        Have other papers observed [this phenomenon]? What mechanisms explain it?"

      Angle 2 (contradicting): "Are there papers that found the OPPOSITE of
        [our finding]? What conditions lead to different outcomes? What did we
        miss that could explain a discrepancy?"

      Angle 3 (alternatives): "What alternative approaches exist for [the problem
        this experiment addressed]? What methods from other fields could apply?
        What would [MoTE / LoTA-QAF / MoLoRA / LoRA Soups] do differently here?"

      FALLBACK ONLY: If NotebookLM doesn't have relevant sources for a specific
      angle, use a targeted web search to fill the gap. Add any valuable new
      papers found to the NotebookLM notebook for future queries.

      For each relevant finding:
      - Extract: source (paper title + arxiv ID, or NotebookLM source name)
      - Key method and result
      - Whether it CONFIRMS, CONTRADICTS, or EXTENDS our result

      ## Step 3: Identify implications and gaps

      Based on the literature sweep, answer:
      1. WHY did this result happen? (mechanistic explanation grounded in literature)
      2. What does this imply for the next experiment? (concrete recommendation)
      3. What alternative approaches exist that we haven't tried?
      4. Should any existing HYPOTHESES.yml node be updated based on this learning?
      5. Is there a new hypothesis worth adding? (only if strongly motivated by literature)

      ## Step 4: Write LEARNINGS.md

      Write [experiment_dir]/LEARNINGS.md with this structure:

      ```markdown
      # Learnings: [experiment_name]

      ## Core Finding
      [1-2 sentence summary]

      ## Why This Happened (Literature-Grounded)
      [Mechanistic explanation citing specific papers]

      ## Confirming Evidence
      [Papers that found the same thing, with arxiv IDs]

      ## Contradicting Evidence
      [Papers that found the opposite, with explanation of discrepancy]

      ## Alternative Approaches (What We Could Try Instead)
      [Concrete methods from literature with paper references]

      ## Implications for Next Experiments
      [How this changes our approach going forward]

      ## New References to Add
      [Any papers that should be added to references/REFERENCES.yml]
      ```

      ## Step 5: Update references

      If you found important new papers, add them to references/REFERENCES.yml
      with the relevant node IDs.

      ## Step 6: Emit

      Emit learning.complete with:
      - Experiment name
      - 1-line core learning
      - Number of confirming/contradicting papers found
      - Whether any hypothesis should be modified

      The RESEARCHER hat will use your LEARNINGS.md when picking the next
      experiment — ensuring accumulated knowledge informs future work.
