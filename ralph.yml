# Ralph Orchestrator — Loophole Discovery Pipeline
# A specialized 5-hat pipeline designed to ruthlessly audit and challenge prior experiments.
#
# Flow:
#   loophole.start → Coordinator (picks next finding and its context cluster)
#                  → experiment.analyze_start → Finding Analyzer (critiques results/claims)
#                  → finding.analyzed         → Code Analyzer (audits code/implementation)
#                  → code.analyzed            → Methodology Analyzer (audits math/proofs)
#                  → methodology.analyzed     → Synthesizer (synthesizes & formalizes in DB)
#                  → synthesis.complete       → Coordinator (picks next)
#
# Start:     ralph -a

cli:
  backend: "gemini"
  default_mode: "autonomous"

adapters:
  gemini:
    timeout: 3600
    args:
      - "--yolo"

event_loop:
  prompt_file: "LOOPHOLES_PROMPT.md"
  starting_event: "loophole.start"
  completion_promise: "ALL_LOOPHOLES_EXHAUSTED"
  max_iterations: 1000
  max_runtime_seconds: 86400
  idle_timeout_secs: 1200
  checkpoint_interval: 10

core:
  guardrails:
    - "RADICAL SKEPTICISM: Your primary directive is to tear down the existing experiments. Find the flaws, the false assumptions, the metric hacking, the logical leaps, and the implementation bugs."
    - "Do not accept ANY findings at face value. A successful experiment is just an experiment that hasn't been audited hard enough yet."
    - "ALL critiques must be written to the experiment's directory as LOOPHOLE_*.md files AND formalized as 'evidence' in the DB."
    - "META-AWARENESS: If you find a flaw, check if it's a systemic 'Meta-Loophole' shared with the 'cluster' of findings provided by the Coordinator."
    - "UV-ONLY EXECUTION: NEVER execute Python scripts directly (e.g. `python script.py`). ALL experiment executions MUST be run via the `experiment run` CLI."
    - "NO SCRATCHPAD SCRIPTS: NEVER write Python scripts or shell scripts just to 'find' experiments or filter lists. Use the `experiment` CLI directly (e.g., `experiment finding-list`). If you find yourself writing a script to process file paths, YOU ARE STUCK. STOP and rethink."

features:
  parallel: false
  auto_merge: true

memories:
  inject: auto
  budget: 2000
  file: ".ralph/loopholes_memories.md"
  filter:
    recent: 60

tasks:
  enabled: true

hats:
  coordinator:
    name: "📋 Coordinator"
    description: "Identifies the next unaudited finding using the experiment CLI. NO SCRIPTS."
    backend_args:
      - "--model"
      - "gemini-2.5-flash"
    triggers:
      - "loophole.start"
      - "synthesis.complete"
    publishes:
      - "experiment.analyze_start"
    default_publishes: "experiment.analyze_start"
    instructions: |
      ## Workflow (STRICT — NO SCRIPTS)
      1. Get all findings: `experiment finding-list`.
      2. Find the first finding ID that has NOT been audited (no "LOOPHOLE_AUDITED" in caveat).
      3. For that finding:
         a) Get its details: `experiment finding-get <id>`.
         b) Get its context cluster (related by status): `experiment finding-list --status <status>`.
         c) Get the associated experiment: `experiment get <exp_id> --yaml`.
      4. Write target details to `.ralph/current_loophole_target.md`:
         ```
         FINDING_ID: <id>
         EXP_ID: <exp_id>
         DIR: <experiment_dir>
         CLUSTER_CONTEXT: [Summary of IDs]
         ```
      5. Emit `experiment.analyze_start` with the ID.

  finding_analyzer:
    name: "🔍 Finding Analyzer"
    description: "Critiques the stated finding. Looks for 'Meta-Loopholes'."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "experiment.analyze_start"
    publishes:
      - "finding.analyzed"
    default_publishes: "finding.analyzed"
    instructions: |
      ## Workflow
      1. Read `.ralph/current_loophole_target.md`.
      2. Read `PAPER.md`, `results.json`, and `MATH.md` in the target experiment directory.
      3. Critique finding aggressively in `LOOPHOLE_FINDING.md`.
      4. Emit `finding.analyzed`.

  code_analyzer:
    name: "💻 Code Analyzer"
    description: "Audits the implementation code for bugs and systemic leaks."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "finding.analyzed"
    publishes:
      - "code.analyzed"
    default_publishes: "code.analyzed"
    instructions: |
      ## Workflow
      1. Read the implementation scripts in the target directory (e.g. `run_experiment.py`).
      2. Audit for flaws (LOOPHOLE_CODE.md).
      3. If verification code needs to be run, use `experiment run <path_to_script>`. NEVER run python raw.
      4. Emit `code.analyzed`.

  methodology_analyzer:
    name: "🔬 Methodology Analyzer"
    description: "Audits the mathematical foundations and prior review."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "code.analyzed"
    publishes:
      - "methodology.analyzed"
    default_publishes: "methodology.analyzed"
    instructions: |
      ## Workflow
      1. Read `MATH.md`, `REVIEW-adversarial.md` in the experiment directory.
      2. Challenge theoretical foundations (LOOPHOLE_METHODOLOGY.md).
      3. Emit `methodology.analyzed`.

  synthesizer:
    name: "🧠 Synthesizer"
    description: "Synthesizes critiques and formalizes the audit as structured 'evidence' in the DB."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "methodology.analyzed"
    publishes:
      - "synthesis.complete"
    default_publishes: "synthesis.complete"
    instructions: |
      ## Workflow
      1. Read `.ralph/current_loophole_target.md` and all `LOOPHOLE_*.md` files.
      2. Synthesize into `LOOPHOLE_FOLLOWUP.md`.
      3. **DB FORMALIZATION**:
         a) Update Finding Caveat: `experiment finding-update <FINDING_ID> --caveat "LOOPHOLE_AUDITED: [Robust|Flawed|Invalid] - See LOOPHOLE_FOLLOWUP.md"`
         b) Add Formal Evidence: `experiment evidence <EXP_ID> --claim "LOOPHOLE_AUDIT: [Summary]" --source "LOOPHOLE_FOLLOWUP.md" --verdict [pass|fail|inconclusive]`
      4. Emit `synthesis.complete`.
