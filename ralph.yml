# Ralph Orchestrator — Loophole Discovery Pipeline
# A specialized 5-hat pipeline designed to ruthlessly audit and challenge prior experiments.
#
# Flow:
#   loophole.start → Coordinator (picks next finding to audit)
#                  → experiment.analyze_start → Finding Analyzer (critiques results/claims)
#                  → finding.analyzed         → Code Analyzer (audits code/implementation)
#                  → code.analyzed            → Methodology Analyzer (audits math/proofs)
#                  → methodology.analyzed     → Synthesizer (synthesizes & marks off in DB)
#                  → synthesis.complete       → Coordinator (picks next)
#
# Start:     ralph -a

cli:
  backend: "gemini"
  default_mode: "autonomous"

adapters:
  gemini:
    timeout: 3600
    args:
      - "--yolo"

event_loop:
  prompt_file: "LOOPHOLES_PROMPT.md"
  starting_event: "loophole.start"
  completion_promise: "ALL_LOOPHOLES_EXHAUSTED"
  max_iterations: 1000
  max_runtime_seconds: 86400
  idle_timeout_secs: 1200
  checkpoint_interval: 10

core:
  guardrails:
    - "RADICAL SKEPTICISM: Your primary directive is to tear down the existing experiments. Find the flaws, the false assumptions, the metric hacking, the logical leaps, and the implementation bugs."
    - "Do not accept ANY findings at face value. A successful experiment is just an experiment that hasn't been audited hard enough yet."
    - "ALL critiques must be written to the experiment's directory as LOOPHOLE_FINDING.md, LOOPHOLE_CODE.md, LOOPHOLE_METHODOLOGY.md, and LOOPHOLE_FOLLOWUP.md."
    - "When designing a follow-up, it must meet the same strict MLX/Apple Silicon requirements as the original project."
    - "ONE AT A TIME: Only process the specific finding and experiment identified by the Coordinator in the current turn."

features:
  parallel: false
  auto_merge: true

memories:
  inject: auto
  budget: 2000
  file: ".ralph/loopholes_memories.md"
  filter:
    recent: 60

tasks:
  enabled: true

hats:
  coordinator:
    name: "📋 Coordinator"
    description: "Identifies the next unaudited finding and orchestrates the audit pipeline."
    backend_args:
      - "--model"
      - "gemini-2.5-flash"
    triggers:
      - "loophole.start"
      - "synthesis.complete"
    publishes:
      - "experiment.analyze_start"
    default_publishes: "experiment.analyze_start"
    instructions: |
      ## Workflow
      1. Get all findings: `experiment finding-list`.
      2. For each finding, check if it has already been audited. Audited findings contain "LOOPHOLE_AUDITED" in their caveat.
         Use `experiment finding-get <id>` to check details if needed.
      3. Select the first finding that has NOT been audited.
      4. Get its associated experiment ID and directory: `experiment get <exp_id> --yaml`.
      5. Write the target details to `.ralph/current_loophole_target.md`:
         ```
         FINDING_ID: <id>
         EXP_ID: <exp_id>
         DIR: <experiment_dir>
         ```
      6. Emit `experiment.analyze_start` with the finding ID and experiment path.
      7. If no more unaudited findings are found, emit `ALL_LOOPHOLES_EXHAUSTED` to terminate.

  finding_analyzer:
    name: "🔍 Finding Analyzer"
    description: "Critiques the stated finding, metrics, and conclusions."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "experiment.analyze_start"
    publishes:
      - "finding.analyzed"
    default_publishes: "finding.analyzed"
    instructions: |
      ## Workflow
      1. Read `.ralph/current_loophole_target.md` for the target finding/experiment.
      2. Read the target's `PAPER.md`, `results.json`, and `MATH.md`.
      3. Critique the finding aggressively (LOOPHOLE_FINDING.md).
      4. Emit `finding.analyzed`.

  code_analyzer:
    name: "💻 Code Analyzer"
    description: "Audits the implementation code for bugs and leaks."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "finding.analyzed"
    publishes:
      - "code.analyzed"
    default_publishes: "code.analyzed"
    instructions: |
      ## Workflow
      1. Read `.ralph/current_loophole_target.md`.
      2. Read the implementation scripts in the target directory.
      3. Audit the code for flaws (LOOPHOLE_CODE.md).
      4. Emit `code.analyzed`.

  methodology_analyzer:
    name: "🔬 Methodology Analyzer"
    description: "Audits the mathematical foundations and prior review."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "code.analyzed"
    publishes:
      - "methodology.analyzed"
    default_publishes: "methodology.analyzed"
    instructions: |
      ## Workflow
      1. Read `.ralph/current_loophole_target.md`.
      2. Read `MATH.md`, `REVIEW-adversarial.md`.
      3. Challenge the theoretical foundations (LOOPHOLE_METHODOLOGY.md).
      4. Emit `methodology.analyzed`.

  synthesizer:
    name: "🧠 Synthesizer"
    description: "Synthesizes critiques and marks the finding as audited in the experiment CLI."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "methodology.analyzed"
    publishes:
      - "synthesis.complete"
    default_publishes: "synthesis.complete"
    instructions: |
      ## Workflow
      1. Read `.ralph/current_loophole_target.md`.
      2. Synthesize all LOOPHOLE_*.md files into LOOPHOLE_FOLLOWUP.md.
      3. Determine the audit verdict: [Robust | Partially Flawed | Invalid].
      4. **Mark off the finding**:
         Run `experiment finding-update <FINDING_ID> --caveat "LOOPHOLE_AUDITED: <verdict> - See LOOPHOLE_FOLLOWUP.md in <DIR>"`
      5. Emit `synthesis.complete`.
