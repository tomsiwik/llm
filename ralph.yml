# Ralph Orchestrator — Infinite Research Loop
# 5-hat pipeline using Claude Code sub-agents for the heavy lifting.
# Separation of concerns: research design vs engineering vs review vs learning.
#
# Flow:
#   research.start → Researcher (ideation + math + run micro experiments)
#                  → experiment.done → Reviewer → verdict
#   verdict        → Analyst (multi-angle research sweep: WHY + literature + implications)
#                  → learning.complete → Researcher picks next experiment
#
# Start:     ralph run -a -v
# Continue:  ralph emit "experiment.done"

cli:
  backend: "claude"
  default_mode: "autonomous"
  idle_timeout_secs: 14400

adapters:
  claude:
    timeout: 14400

event_loop:
  prompt_file: "PROMPT.md"
  starting_event: "research.start"
  completion_promise: "RESEARCH_BACKLOG_DRAINED"
  max_iterations: 1000
  max_runtime_seconds: 86400
  verbose: true

core:
  guardrails:
    - "ALL experiments MUST run on Apple Silicon via MLX. No CUDA. No RunPod. Target: M5 Pro 48GB."
    - "Invoke /fast-mlx and /mlx-dev skills before writing ANY MLX code."
    - "Use `experiment get <id> --yaml` for full structured experiment details."
    - "After completing an experiment, update structured kill criteria via `experiment kill-update`."

features:
  parallel: true
  auto_merge: true

memories:
  inject: auto
  budget: 800
  file: ".ralph/memories.md"

tasks:
  enabled: true

hats:
  # ── Researcher: design + run experiments on Apple Silicon ──────────────
  researcher:
    name: "🔬 Researcher"
    description: "Designs and runs micro experiments via experiment-ideator on Apple Silicon MLX."
    triggers:
      - "research.start"
      - "learning.complete"
      - "review.revise"
    publishes:
      - "experiment.done"
    instructions: |
      Delegate to experiment-ideator sub-agent. Do NOT do research yourself.

      ## Context (if triggered by review.revise or learning.complete)
      Read .ralph/current_direction.md. If triggered by revise, read REVIEW-adversarial.md.
      If triggered by learning.complete, read LEARNINGS.md for context.

      ## Orphan check
      If last experiment's REVIEW-adversarial.md or LEARNINGS.md is missing, resolve first.

      ## Pick + Delegate

      1. Run: `experiment claim researcher`
         This gives you full YAML: kill criteria with IDs, notes, deps, everything.

      2. Delegate to experiment-ideator with the claim output:
         "Work on experiment [id]: '[title]'. [paste kill criteria + notes].
          SCALE: micro. PLATFORM: Apple Silicon MLX.
          Full cycle: survey, math, implement, run, write PAPER.md.
          Write direction to .ralph/current_direction.md.
          Invoke /fast-mlx and /mlx-dev before MLX code.
          Consult NotebookLM for prior art before implementing."

      3. After sub-agent returns, verify PAPER.md exists, then:
         `experiment complete <id> --status supported --dir micro/models/[name]/ --k <id>:pass --k <id>:fail --evidence "summary"`

      4. Emit experiment.done with key results.

      If fewer than 3 open experiments remain, add 1 new hypothesis via `experiment add`.

  # ── Reviewer: delegate to adversarial-reviewer sub-agent ────────────────
  reviewer:
    name: "🔴 Reviewer"
    description: "Spawns adversarial-reviewer sub-agent, then integrates results and routes to analyst"
    triggers:
      - "experiment.done"
    publishes:
      - "review.proceed"
      - "review.revise"
      - "review.killed"
    instructions: |
      Delegate review to adversarial-reviewer sub-agent. Do NOT review yourself.

      1. Read .ralph/current_direction.md to find experiment_dir (micro/models/[name]/).
         Verify PAPER.md exists.

      2. Delegate: Agent(subagent_type="adversarial-reviewer"):
         "Review [experiment_dir]/. Read MATH.md + PAPER.md.
          Write REVIEW-adversarial.md with verdict: PROCEED, REVISE, or KILL."

      3. Read verdict from REVIEW-adversarial.md:
         - REVISE: emit review.revise with numbered fixes.
         - KILL: `experiment complete <id> --status killed --evidence "KILLED: [reason]"`
                 Emit review.killed.
         - PROCEED: Append results to FINDINGS.md. Update VISION.md readiness if applicable.
                    Emit review.proceed.

  # ── Analyst: multi-angle research sweep after every result ───────────────
  analyst:
    name: "🧠 Analyst"
    description: "Researches WHY a result happened, finds confirming/contradicting literature, writes LEARNINGS.md."
    triggers:
      - "review.proceed"
      - "review.killed"
    publishes:
      - "learning.complete"
    instructions: |
      Research WHY a result happened. Do NOT just summarize PAPER.md — ADD knowledge.

      1. Read [experiment_dir]/PAPER.md + REVIEW-adversarial.md.

      2. Query NotebookLM from 3 angles:
         - Confirming: "What research supports [core finding]?"
         - Contradicting: "What papers found the opposite?"
         - Alternatives: "What other approaches exist for this problem?"
         Web search as fallback only.

      3. Write [experiment_dir]/LEARNINGS.md:
         - Core Finding (1-2 sentences)
         - Why This Happened (cite papers)
         - Confirming Evidence (arxiv IDs)
         - Contradicting Evidence
         - Alternative Approaches
         - Implications for Next Experiments

      4. Add new papers: `experiment ref-add --arxiv <id> --title "..." --relevance "..." --tag <tag>`

      5. Emit learning.complete with experiment name + 1-line core learning.
