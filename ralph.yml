# Ralph Orchestrator — Experiment Research Loop
# 3-hat event-driven workflow on top of Ralph v2.
# Ralph handles routing; `experiment` owns experiment state; `experiment run`/pueue own execution.
#
# Flow:
#   research.start -> Researcher -> experiment.done -> Reviewer -> review.proceed|review.revise|review.killed
#   review.proceed|review.killed -> Analyst -> learning.complete -> Researcher
#
# Start: ralph run -a -v

cli:
  backend: "claude"
  default_mode: "autonomous"

adapters:
  claude:
    timeout: 3600

event_loop:
  starting_event: "research.start"
  completion_promise: "RESEARCH_BACKLOG_DRAINED"
  max_iterations: 1000
  max_runtime_seconds: 86400
  idle_timeout_secs: 1200
  checkpoint_interval: 10

core:
  scratchpad: ".ralph/agent/scratchpad.md"
  specs_dir: ".ralph/specs/"
  guardrails:
    - "READ `PLAN.md` Part 2 for base model, platform, adapter approach."
    - "Use `experiment claim <worker>` to pick work. Use `experiment complete <id> ...` to finish."
    - "PROOF-FIRST: MATH.md with theorem + predictions before code. Cite arxiv or prior finding."
    - "Every experiment needs at least one TARGET-METRIC KC (task accuracy, benchmark score). Proxy-only (cosine, PPL) is not enough."
    - "NEVER wait for user input. NEVER spawn sub-agents. Always pick and proceed."
    - "If an experiment needs adapter weights that don't exist, KILL in one line and move on. Do NOT write 6 files about it."
    - "INVOKE `/mlx-dev` and `/fast-mlx` BEFORE writing MLX code. Skipping them is the #1 cause of broken experiments."
    - "Composition math: `Σ (B_i @ A_i)` NOT `(ΣB) @ (ΣA)`. LORA_SCALE ≤ 8. Route per-sample, not per-domain."
    - "ANTI-STUCK: Each hat < 30 min. REVISE max 3 fixes. Never retry > 3 times."
    - "Do NOT accumulate antipattern memories. The memories file must stay under 50 lines. Only add a memory if it prevents a real code bug, not a process classification."

features:
  parallel: false
  auto_merge: false

memories:
  inject: auto
  budget: 500
  file: ".ralph/agent/memories.md"
  filter:
    recent: 60

tasks:
  enabled: true

hats:
  researcher:
    name: "🔬 Researcher"
    description: "Pick experiment, run it, measure results. Write MATH.md, implement, run, write PAPER.md."
    backend_args:
      - "--effort"
      - "medium"
      - "--model"
      - "claude-opus-4-6"
      - "--append-system-prompt-file"
      - "EXPERIMENT.md"
      - "--max-turns"
      - "100"
    triggers:
      - "research.start"
      - "learning.complete"
      - "review.revise"
    publishes:
      - "experiment.done"
    default_publishes: "experiment.done"
    instructions: |
      Read `.ralph/hats/researcher.md` and follow it.
      Read `PLAN.md` Part 2 for current research focus.
      PRIORITY: experiments that TRAIN ADAPTERS or RUN REAL MLX CODE come first. Skip doc-only work.

  reviewer:
    name: "🔴 Reviewer"
    description: "Review MATH.md + PAPER.md, write REVIEW-adversarial.md, route verdict."
    backend_args:
      - "--effort"
      - "medium"
      - "--model"
      - "claude-opus-4-6"
      - "--max-turns"
      - "40"
    triggers:
      - "experiment.done"
    publishes:
      - "review.proceed"
      - "review.revise"
      - "review.killed"
    default_publishes: "review.proceed"
    instructions: |
      Read `.ralph/hats/reviewer.md` and follow it.
      Review from disk directly. Max 15 min, max 20 tool calls.
      Keep REVIEW-adversarial.md under 1 page. Do NOT create new antipattern memories.

  analyst:
    name: "🧠 Analyst"
    description: "Write LEARNINGS.md — 30 lines max. Quick pass, max 10 min."
    backend_args:
      - "--effort"
      - "low"
      - "--model"
      - "claude-opus-4-6"
      - "--max-turns"
      - "20"
    triggers:
      - "review.proceed"
      - "review.killed"
    publishes:
      - "learning.complete"
    default_publishes: "learning.complete"
    max_activations: 50
    instructions: |
      Read `.ralph/hats/analyst.md` and follow it.
      LEARNINGS.md: 30 lines max. Core finding, why, one implication.
      Do NOT create or modify antipattern memories. Do NOT write taxonomies or sub-classifications.
      Emit `learning.complete` and move on.
