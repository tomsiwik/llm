# Ralph Orchestrator — Infinite Research Loop
# 2-hat pipeline using Claude Code sub-agents for the heavy lifting.
# Each hat dispatches to a focused sub-agent that runs autonomously.
# The loop NEVER completes — findings always generate new questions.
#
# Start:     ralph run -a
# Continue:  ralph emit "experiment.done"  → enters at reviewer

cli:
  backend: "claude"

event_loop:
  prompt_file: "PROMPT.md"
  starting_event: "research.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 200
  idle_timeout_secs: 7200

features:
  parallel: true
  auto_merge: true

memories:
  inject: auto
  budget: 1500
  file: ".ralph/memories.md"

hats:
  # ── Researcher: delegate to experiment-ideator sub-agent ─────────────────
  researcher:
    name: "🔬 Researcher"
    description: "Spawns experiment-ideator sub-agent to run a full research cycle"
    triggers:
      - "research.start"
      - "experiment.integrated"
      - "review.revise"
      - "review.killed"
    publishes:
      - "experiment.done"
    instructions: |
      You coordinate a research cycle by delegating to the experiment-ideator
      sub-agent. Do NOT do the research yourself. Do NOT stop to ask for
      confirmation. Complete all steps in one session.

      ## Before delegating

      Read .ralph/current_direction.md if it exists to check state.

      If triggered by review.revise:
        Read micro/models/[name]/REVIEW-adversarial.md for the numbered fixes.
        Include these fixes in your delegation prompt.

      If triggered by review.killed:
        Read micro/models/[name]/REVIEW-adversarial.md to understand why.
        Include the kill reason so the researcher avoids the same mistake.

      If triggered by research.start or experiment.integrated:
        Read HYPOTHESES.yml. Pick the lowest-priority-number `open` node
        whose `depends_on` are all satisfied (all deps must be `proven`).
        Set it to `active` in HYPOTHESES.yml. If no open nodes remain,
        first generate 2-3 new hypothesis nodes from existing findings
        and add them to HYPOTHESES.yml before delegating.

        PARALLEL: If multiple independent nodes (no shared deps, different
        experiment_dirs) are eligible, you MAY launch multiple experiment-ideator
        agents in parallel using separate Agent tool calls. Track each node_id
        independently and emit experiment.done for each when complete.

      ## Baseline-First Rule (MANDATORY)

      Before delegating, identify which references are relevant to the hypothesis.
      Check references/REFERENCES.yml for matching node IDs. Include relevant
      reference paths in the delegation prompt so the researcher builds on
      prior art instead of reinventing.

      For macro-scale work, the primary baselines are:
        - references/qwen3-coder-next/ (SOTA sparse MoE architecture)
        - references/qwen3.5-from-scratch/ + miniqwen.py (Qwen3.5 implementation)
        - references/LLMs-from-scratch/ (educational ground truth)
        - references/reasoning-from-scratch/ (reasoning patterns)

      ## NotebookLM Research (MANDATORY for cross-domain nodes)

      If the HYPOTHESES.yml node has tag `cross-domain` or `novel`:
        Include in the delegation prompt: "Use /notebooklm to research
        SOTA approaches, CODE EXAMPLES, and existing repos for [mechanism].
        Find implementations you can adapt rather than building from scratch.
        Save any useful repos/papers to references/ with a README.md.
        The notes field in HYPOTHESES.yml tells you what to search for."

      ## Delegate

      Use the Agent tool with subagent_type="experiment-ideator" to run
      the full research cycle. Give it a clear prompt:

        "Work on hypothesis [node_id] from HYPOTHESES.yml: '[title]'.
         Kill criteria: [kill_criteria]. Run the full cycle: survey,
         formalize math, implement, run experiment, write PAPER.md.
         Write your chosen direction to .ralph/current_direction.md.
         BASELINE-FIRST: Check these references before implementing:
         [list relevant references/*/]. Build on existing code, don't
         reinvent. Also check references/LLMs-from-scratch/ and
         references/reasoning-from-scratch/ for standard implementations.
         REUSE-FIRST: Use /notebooklm to find existing implementations of
         [mechanism from notes field]. Add repos to references/. Only write
         custom code for the project-specific integration.
         [If revise: Include the specific fixes from the review.]
         [If killed: Explain why the previous direction failed.]"

      Wait for the sub-agent to complete. Do NOT interrupt it.

      ## After sub-agent returns

      Verify that micro/models/[name]/PAPER.md exists with results.
      Reset .ralph/agent/scratchpad.md to a 1-line summary.
      Emit experiment.done with a brief summary of results.

  # ── Reviewer: delegate to adversarial-reviewer sub-agent ─────────────────
  reviewer:
    name: "🔴 Reviewer"
    description: "Spawns adversarial-reviewer sub-agent, then integrates results"
    triggers:
      - "experiment.done"
    publishes:
      - "experiment.integrated"
      - "review.revise"
      - "review.killed"
    instructions: |
      You coordinate peer review and integration. Do NOT do the review yourself.
      Do NOT stop to ask for confirmation. Complete all steps in one session.

      ## Step 1: Delegate review

      Read .ralph/current_direction.md to find the experiment name.

      Use the Agent tool with subagent_type="adversarial-reviewer" to review
      the experiment. Give it a clear prompt:

        "Review the experiment at micro/models/[name]/. Read its MATH.md and
         PAPER.md. Write REVIEW-adversarial.md with your verdict:
         PROCEED, REVISE (with numbered fixes), or KILL (with explanation)."

      Wait for the sub-agent to complete. Do NOT interrupt it.

      ## Step 2: Read verdict

      Read micro/models/[name]/REVIEW-adversarial.md.
      Extract the verdict: PROCEED, REVISE, or KILL.

      If REVISE: emit review.revise with the numbered fixes. Stop here.
      If KILL:
        - In HYPOTHESES.yml: set the node status to `disproven`, append evidence
        - Cascade: set any nodes whose `depends_on` include this node to `blocked`
        - Increment `meta.consecutive_kills`
        - If `meta.consecutive_kills` >= 3: emit `research.exhaustion_warning`
        - Emit review.killed with explanation. Stop here.

      ## Step 3: Integrate (only if PROCEED)

      Do this yourself (fast, no sub-agent needed):
      - In HYPOTHESES.yml: set the node status to `proven`, append evidence
        with date/claim/source, reset `meta.consecutive_kills` to 0,
        update `meta.last_proven`
      - Unblock dependents: nodes that depended on this one are now eligible
      - Generate 1-3 NEW hypothesis nodes in HYPOTHESES.yml from findings
      - Regenerate VISION.md "What Remains" from open nodes in HYPOTHESES.yml
      - Update VISION.md "What's Been Proven"
      - Append results to FINDINGS.md with date
      - Add memories to .ralph/memories.md (only append, never overwrite)

      Reset .ralph/agent/scratchpad.md to a 1-line summary.
      Emit experiment.integrated.
