# Ralph Orchestrator — Experiment Research Loop
# 3-hat event-driven workflow on top of Ralph v2.
# Ralph handles routing; `experiment` owns experiment state; `experiment run`/pueue own execution.
#
# Flow:
#   research.start -> Researcher -> experiment.done -> Reviewer -> review.proceed|review.revise|review.killed
#   review.proceed|review.killed -> Analyst -> learning.complete -> Researcher
#
# Start: ralph run -a -v
# Manual event injection is available via `ralph emit`, but normal operation is event-driven from the loop.

cli:
  backend: "claude"
  default_mode: "autonomous"

adapters:
  claude:
    timeout: 3600  # 1h max per hat (covers experiment execution up to ~45min)
    args:
      - "--bare"

event_loop:
  # prompt_file removed — hat instructions are self-contained
  # Project context: ../VISION_P1.md, ../ARCHITECTURE_P1.md
  starting_event: "research.start"
  completion_promise: "RESEARCH_BACKLOG_DRAINED"
  max_iterations: 1000
  max_runtime_seconds: 86400
  idle_timeout_secs: 1200  # 20 min idle = stuck (moved from cli: per docs)
  checkpoint_interval: 10

core:
  # Make Ralph's working files explicit instead of relying on defaults.
  scratchpad: ".ralph/agent/scratchpad.md"
  specs_dir: ".ralph/specs/"
  guardrails:
    - "PROOF-FIRST RESEARCH (Constructive Mathematics): Every experiment requires a formal mathematical proof (Theorem/Proof/QED) BEFORE any code is written. The proof must: (1) identify the failure mode, (2) cite prior theorems, (3) derive a guarantee that makes failure impossible, (4) predict specific BEHAVIORAL outcomes the experiment will verify. Metrics (PPL, cosine, accuracy) are proxies — the real question is always behavioral: 'does this produce useful output?' and 'does this advance the vision?' A metric improving without behavioral progress is not a finding. A metric degrading with behavioral progress IS a finding."
    - "ALL experiments MUST run on Apple Silicon via MLX. No CUDA. No RunPod. Target: M5 Pro 48GB."
    - "Invoke /fast-mlx and /mlx-dev skills before writing ANY MLX code."
    - "Use `experiment claim <worker>` to pick work. Use `experiment complete <id> ...` to finish."
    - "NEVER generate experiments from analogies. Every new experiment MUST cite an arxiv paper or prior LEARNINGS.md finding."
    - "Before implementing, check `experiment query` for prior results on the same topic. NotebookLM is available but optional — do NOT use it in the main loop (too slow). Use it in manual sessions only."
    - "MATH.md must explain mechanisms at the ATOMIC level: exact equations, why it works (theorem/lemma), what breaks it (derive failure conditions), and how it connects to our architecture. No buzzword recitation."
    - "Architecture reference: https://sebastianraschka.com/llm-architecture-gallery/ — compare our design against production models."
    - "KILLED experiments are not dead ends. Ask: 'What structure makes this failure impossible?' If you can derive a mathematical guarantee, the experiment is resurrected with a structural fix, not a hyperparameter tweak."
    - "BEHAVIORAL OUTCOMES OVER METRICS: PPL, cosine, accuracy are proxies. The real questions: Does routed composition produce USEFUL text? Does the system advance toward the VISION? A finding that 'PPL improved by 4%' without showing behavioral improvement is provisional at best. The project proved PPL doesn't predict task quality (r=0.08). Design experiments that test behavioral claims, not metric claims."
    - "ANTI-STUCK: REVISE fixes max 30 min. If >3 blocking fixes, apply top 3 and defer rest. Each hat transition <30 min. If stuck, emit next event with [TIMEOUT] prefix. Never retry failed API call >3 times."
    - "PROJECT CONTEXT: Read ../VISION_P1.md and ../ARCHITECTURE_P1.md for current architecture. This is a Gemma 4 + PoLAR adapter + Grassmannian composition system."

features:
  # Ralph worktree parallelism is counterproductive here:
  # experiment claim + Turso DB already coordinate ownership, and pueue serializes actual runs.
  # Keep one Ralph loop as the orchestrator of record.
  parallel: false
  auto_merge: false

memories:
  inject: auto
  budget: 2000
  file: ".ralph/memories.md"
  filter:
    recent: 60

tasks:
  enabled: true

hats:
  # ── Researcher: design + run experiments on Apple Silicon ──────────────
  researcher:
    name: "🔬 Researcher"
    description: "Designs and runs micro experiments on Apple Silicon MLX. Writes MATH.md, implements, runs, writes PAPER.md."
    backend_args:
      - "--effort"
      - "high"
      - "--model"
      - "sonnet"
      - "--append-system-prompt-file"
      - "EXPERIMENT.md"
      - "--max-turns"
      - "40"
    triggers:
      - "research.start"
      - "learning.complete"
      - "review.revise"
    publishes:
      - "experiment.done"
    default_publishes: "experiment.done"
    instructions: |
      Read `ralph/hats/researcher.md` first and follow it for role-specific behavior.
      Treat `AGENTS.md` and loaded skills as the source of domain policy and CLI knowledge.
      Use event payloads as the primary handoff signal; use `.ralph/current_direction.md` only as fallback.

  # ── Reviewer: delegate to adversarial-reviewer sub-agent ────────────────
  reviewer:
    name: "🔴 Reviewer"
    description: "Reviews MATH.md + PAPER.md directly, writes REVIEW-adversarial.md, routes verdict."
    backend_args:
      - "--effort"
      - "high"
      - "--model"
      - "sonnet"
      - "--max-turns"
      - "20"
    triggers:
      - "experiment.done"
    publishes:
      - "review.proceed"
      - "review.revise"
      - "review.killed"
    default_publishes: "review.proceed"
    instructions: |
      Read `ralph/hats/reviewer.md` first and follow it for role-specific behavior.
      Review from disk directly, not via sub-agents.
      Use the triggering event payload as the primary handoff signal; use `.ralph/current_direction.md` only as fallback.

  # ── Analyst: multi-angle research sweep after every result ───────────────
  analyst:
    name: "🧠 Analyst"
    description: "Writes LEARNINGS.md with literature context. Quick pass, max 10 min."
    backend_args:
      - "--effort"
      - "medium"
      - "--model"
      - "sonnet"
      - "--max-turns"
      - "10"
    triggers:
      - "review.proceed"
      - "review.killed"
    publishes:
      - "learning.complete"
    default_publishes: "learning.complete"
    max_activations: 50
    instructions: |
      Read `ralph/hats/analyst.md` first and follow it for role-specific behavior.
      Keep this pass short and synthesis-focused.
      Use the triggering event payload as the primary handoff signal; use `.ralph/current_direction.md` only as fallback.
