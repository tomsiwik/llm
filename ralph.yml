# Ralph Orchestrator — Loophole Discovery Pipeline
# A specialized 5-hat pipeline designed to ruthlessly audit and challenge prior experiments.
#
# Flow:
#   loophole.start → Coordinator (picks next finding and its context cluster)
#                  → experiment.analyze_start → Finding Analyzer (critiques results/claims)
#                  → finding.analyzed         → Code Analyzer (audits code/implementation)
#                  → code.analyzed            → Methodology Analyzer (audits math/proofs)
#                  → methodology.analyzed     → Synthesizer (synthesizes & formalizes in DB)
#                  → synthesis.complete       → Coordinator (picks next)
#
# Start:     ralph -a

cli:
  backend: "gemini"
  default_mode: "autonomous"

adapters:
  gemini:
    timeout: 3600
    args:
      - "--yolo"

event_loop:
  prompt_file: "LOOPHOLES_PROMPT.md"
  starting_event: "loophole.start"
  completion_promise: "ALL_LOOPHOLES_EXHAUSTED"
  max_iterations: 1000
  max_runtime_seconds: 86400
  idle_timeout_secs: 1200
  checkpoint_interval: 10

core:
  guardrails:
    - "RADICAL SKEPTICISM: Your primary directive is to tear down the existing experiments. Find the flaws, the false assumptions, the metric hacking, the logical leaps, and the implementation bugs."
    - "Do not accept ANY findings at face value. A successful experiment is just an experiment that hasn't been audited hard enough yet."
    - "ALL critiques must be written to the experiment's directory as LOOPHOLE_*.md files AND formalized as 'evidence' in the DB."
    - "META-AWARENESS: If you find a flaw, check if it's a systemic 'Meta-Loophole' shared with the 'cluster' of findings provided by the Coordinator."

features:
  parallel: false
  auto_merge: true

memories:
  inject: auto
  budget: 2000
  file: ".ralph/loopholes_memories.md"
  filter:
    recent: 60

tasks:
  enabled: true

hats:
  coordinator:
    name: "📋 Coordinator"
    description: "Identifies the next unaudited finding and its 'Context Cluster' (related findings/tags)."
    backend_args:
      - "--model"
      - "gemini-2.5-flash"
    triggers:
      - "loophole.start"
      - "synthesis.complete"
    publishes:
      - "experiment.analyze_start"
    default_publishes: "experiment.analyze_start"
    instructions: |
      ## Workflow
      1. Get all findings: `experiment finding-list`.
      2. Select the first finding that has NOT been audited (no "LOOPHOLE_AUDITED" in caveat).
      3. **CONTEXT CLUSTER**:
         a) Get finding details: `experiment finding-get <id>`.
         b) Find all findings with the same tags or status: `experiment finding-list --status [status]`.
         c) Get associated experiment details: `experiment get <exp_id> --yaml`.
      4. Write target details to `.ralph/current_loophole_target.md`:
         ```
         FINDING_ID: <id>
         EXP_ID: <exp_id>
         DIR: <experiment_dir>
         CLUSTER_CONTEXT: [List IDs of findings sharing the same tags/failure-modes]
         ```
      5. Emit `experiment.analyze_start` with the finding ID and cluster context.

  finding_analyzer:
    name: "🔍 Finding Analyzer"
    description: "Critiques the stated finding. Looks for 'Meta-Loopholes' shared with the context cluster."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "experiment.analyze_start"
    publishes:
      - "finding.analyzed"
    default_publishes: "finding.analyzed"
    instructions: |
      ## Workflow
      1. Read `.ralph/current_loophole_target.md`.
      2. Read `PAPER.md`, `results.json`, and `MATH.md`.
      3. Compare this finding against the `CLUSTER_CONTEXT`. Are the same metric biases appearing across the cluster?
      4. Write critique to `LOOPHOLE_FINDING.md`.
      5. Emit `finding.analyzed`.

  code_analyzer:
    name: "💻 Code Analyzer"
    description: "Audits the implementation code for bugs and systemic leaks."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "finding.analyzed"
    publishes:
      - "code.analyzed"
    default_publishes: "code.analyzed"
    instructions: |
      ## Workflow
      1. Read the implementation scripts in the target directory.
      2. Audit for leaks. Check if the leakage mechanism (e.g. wrong shuffle) exists in other experiments in the cluster.
      3. Write audit to `LOOPHOLE_CODE.md`.
      4. Emit `code.analyzed`.

  methodology_analyzer:
    name: "🔬 Methodology Analyzer"
    description: "Audits the mathematical foundations and prior review."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "code.analyzed"
    publishes:
      - "methodology.analyzed"
    default_publishes: "methodology.analyzed"
    instructions: |
      ## Workflow
      1. Read `MATH.md`, `REVIEW-adversarial.md`.
      2. Identify "Root Math Failures" (e.g. invalid proof steps) that might be plaguing the entire project.
      3. Write critique to `LOOPHOLE_METHODOLOGY.md`.
      4. Emit `methodology.analyzed`.

  synthesizer:
    name: "🧠 Synthesizer"
    description: "Synthesizes critiques and formalizes the audit as structured 'evidence' in the DB."
    backend_args:
      - "--model"
      - "gemini-3.1-pro-preview"
    triggers:
      - "methodology.analyzed"
    publishes:
      - "synthesis.complete"
    default_publishes: "synthesis.complete"
    instructions: |
      ## Workflow
      1. Read `.ralph/current_loophole_target.md` and all `LOOPHOLE_*.md` files.
      2. Synthesize into `LOOPHOLE_FOLLOWUP.md`.
      3. **DB FORMALIZATION**:
         a) Update Finding Caveat: `experiment finding-update <FINDING_ID> --caveat "LOOPHOLE_AUDITED: [Robust|Flawed|Invalid] - See LOOPHOLE_FOLLOWUP.md"`
         b) Add Formal Evidence: `experiment evidence <EXP_ID> --claim "LOOPHOLE_AUDIT: [Brief summary of flaws/success]" --source "LOOPHOLE_FOLLOWUP.md" --verdict [pass|fail|inconclusive]`
      4. Emit `synthesis.complete`.
